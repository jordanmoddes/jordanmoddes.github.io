<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DAN IS THE BEST</title>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Fredoka+One&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --hot-pink: #ff006e;
      --electric-yellow: #ffbe0b;
      --cyber-green: #06ffa5;
      --ultra-blue: #3a86ff;
      --purple: #8338ec;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      font-family: 'Fredoka One', cursive;
      overflow-x: hidden;
      cursor: none;
    }

    /* Custom cursor */
    .cursor {
      width: 30px;
      height: 30px;
      border: 3px solid var(--hot-pink);
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.1s ease, background 0.2s;
      mix-blend-mode: difference;
    }

    /* Disco background */
    .disco-bg {
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(ellipse at 20% 50%, rgba(131,56,236,0.3) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(255,0,110,0.3) 0%, transparent 60%),
        radial-gradient(ellipse at 60% 80%, rgba(58,134,255,0.2) 0%, transparent 60%),
        #0a0a0a;
      animation: bgPulse 3s ease-in-out infinite alternate;
      z-index: 0;
    }

    @keyframes bgPulse {
      from { filter: hue-rotate(0deg); }
      to { filter: hue-rotate(60deg); }
    }

    /* Stars */
    .stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .star {
      position: absolute;
      border-radius: 50%;
      animation: twinkle var(--d) ease-in-out infinite alternate;
    }
    @keyframes twinkle {
      from { opacity: 0.1; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1.2); }
    }

    /* Main container */
    .container {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      gap: 20px;
    }

    /* Screaming headline */
    .headline {
      font-family: 'Bangers', cursive;
      font-size: clamp(60px, 15vw, 160px);
      letter-spacing: 4px;
      text-align: center;
      line-height: 0.9;
      position: relative;
    }
    .headline span {
      display: block;
      animation: rainbow 1s linear infinite;
      -webkit-text-stroke: 3px #000;
      filter: drop-shadow(0 0 20px currentColor);
    }
    .headline .dan { color: var(--electric-yellow); animation-delay: 0s; font-size: 1.4em; }
    .headline .is { color: var(--hot-pink); animation-delay: 0.2s; }
    .headline .the { color: var(--cyber-green); animation-delay: 0.4s; }
    .headline .best { color: var(--ultra-blue); animation-delay: 0.6s; font-size: 1.5em; }

    @keyframes rainbow {
      0% { filter: drop-shadow(0 0 20px currentColor) hue-rotate(0deg); }
      100% { filter: drop-shadow(0 0 40px currentColor) hue-rotate(360deg); }
    }

    /* Cat container */
    .cat-stage {
      position: relative;
      width: 280px;
      height: 280px;
    }

    /* Glow ring */
    .glow-ring {
      position: absolute;
      inset: -20px;
      border-radius: 50%;
      background: conic-gradient(var(--hot-pink), var(--electric-yellow), var(--cyber-green), var(--ultra-blue), var(--purple), var(--hot-pink));
      animation: spinRing 1s linear infinite;
      filter: blur(8px);
      opacity: 0.8;
    }
    @keyframes spinRing { to { transform: rotate(360deg); } }

    .cat-bg {
      position: absolute;
      inset: 10px;
      border-radius: 50%;
      background: #111;
      z-index: 1;
    }

    /* The CSS Cat */
    .cat-wrap {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      animation: dance 0.4s ease-in-out infinite alternate;
      transform-origin: bottom center;
    }

    @keyframes dance {
      0%   { transform: rotate(-15deg) translateY(0px) scaleX(1); }
      25%  { transform: rotate(0deg) translateY(-15px) scaleX(0.95); }
      50%  { transform: rotate(15deg) translateY(0px) scaleX(1); }
      75%  { transform: rotate(0deg) translateY(-10px) scaleX(1.05); }
      100% { transform: rotate(-15deg) translateY(0px) scaleX(1); }
    }

    .cat {
      font-size: 120px;
      line-height: 1;
      filter: drop-shadow(0 0 15px var(--electric-yellow));
      animation: catBounce 0.4s ease-in-out infinite alternate, catColor 2s linear infinite;
      user-select: none;
    }

    @keyframes catBounce {
      from { transform: scaleY(1) translateY(0); }
      to { transform: scaleY(1.08) translateY(-5px); }
    }
    @keyframes catColor {
      0%   { filter: drop-shadow(0 0 20px #ff006e) hue-rotate(0deg); }
      33%  { filter: drop-shadow(0 0 20px #ffbe0b) hue-rotate(120deg); }
      66%  { filter: drop-shadow(0 0 20px #06ffa5) hue-rotate(240deg); }
      100% { filter: drop-shadow(0 0 20px #ff006e) hue-rotate(360deg); }
    }

    /* Music notes flying */
    .note {
      position: fixed;
      font-size: 2rem;
      pointer-events: none;
      animation: floatNote var(--dur) ease-in forwards;
      z-index: 10;
    }
    @keyframes floatNote {
      0%   { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
      100% { opacity: 0; transform: translateY(-300px) rotate(720deg) scale(0.5); }
    }

    /* Subtitle ticker */
    .ticker-wrap {
      width: 100%;
      background: var(--hot-pink);
      overflow: hidden;
      border-top: 4px solid var(--electric-yellow);
      border-bottom: 4px solid var(--electric-yellow);
      padding: 10px 0;
      position: relative;
    }
    .ticker {
      display: flex;
      white-space: nowrap;
      animation: ticker 8s linear infinite;
      font-family: 'Bangers', cursive;
      font-size: 28px;
      letter-spacing: 3px;
      color: #000;
      gap: 60px;
    }
    @keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }

    /* Crown floating above */
    .crown {
      font-size: 80px;
      animation: crownBob 1s ease-in-out infinite alternate, crownSpin 4s linear infinite;
      filter: drop-shadow(0 0 20px gold);
      position: absolute;
      top: -80px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
    }
    @keyframes crownBob {
      from { transform: translateX(-50%) translateY(0px); }
      to { transform: translateX(-50%) translateY(-15px); }
    }
    @keyframes crownSpin {
      0%   { filter: drop-shadow(0 0 20px gold) hue-rotate(0deg); }
      100% { filter: drop-shadow(0 0 20px gold) hue-rotate(360deg); }
    }

    /* Trophy row */
    .trophies {
      display: flex;
      gap: 20px;
      font-size: 50px;
      animation: trophyBounce 0.5s ease-in-out infinite alternate;
      filter: drop-shadow(0 0 10px gold);
    }
    @keyframes trophyBounce {
      from { transform: translateY(0) rotate(-5deg); }
      to { transform: translateY(-10px) rotate(5deg); }
    }
    .trophies span { animation: trophyPop 0.5s ease-in-out infinite alternate; }
    .trophies span:nth-child(2) { animation-delay: 0.1s; }
    .trophies span:nth-child(3) { animation-delay: 0.2s; }
    @keyframes trophyPop {
      from { transform: scale(1); }
      to { transform: scale(1.3); }
    }

    /* Dan facts */
    .facts {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      max-width: 700px;
    }
    .fact {
      background: linear-gradient(135deg, var(--purple), var(--ultra-blue));
      border: 3px solid var(--cyber-green);
      border-radius: 50px;
      padding: 10px 20px;
      font-size: 18px;
      color: #fff;
      animation: factPop 2s ease-in-out infinite alternate;
      text-align: center;
    }
    .fact:nth-child(2n) { background: linear-gradient(135deg, var(--hot-pink), var(--purple)); border-color: var(--electric-yellow); animation-delay: 0.3s; }
    .fact:nth-child(3n) { background: linear-gradient(135deg, var(--cyber-green), var(--ultra-blue)); border-color: var(--hot-pink); color: #000; animation-delay: 0.6s; }
    @keyframes factPop {
      from { transform: scale(1) rotate(-1deg); }
      to { transform: scale(1.05) rotate(1deg); }
    }

    /* Big button */
    .hype-btn {
      font-family: 'Bangers', cursive;
      font-size: 36px;
      letter-spacing: 3px;
      background: linear-gradient(90deg, var(--hot-pink), var(--electric-yellow), var(--cyber-green), var(--ultra-blue), var(--hot-pink));
      background-size: 300%;
      color: #000;
      border: none;
      padding: 16px 40px;
      border-radius: 60px;
      cursor: pointer;
      animation: btnShift 2s linear infinite;
      box-shadow: 0 0 30px var(--hot-pink), 0 0 60px var(--purple);
      transition: transform 0.1s;
      position: relative;
      overflow: hidden;
    }
    .hype-btn:hover { transform: scale(1.1) rotate(-2deg); }
    .hype-btn:active { transform: scale(0.95); }
    @keyframes btnShift { to { background-position: 300% center; } }

    /* Confetti pieces */
    .confetti-piece {
      position: fixed;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      pointer-events: none;
      animation: confettiFall var(--dur) linear forwards;
      z-index: 5;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0.3; }
    }

    /* Footer */
    .footer {
      font-size: 16px;
      color: rgba(255,255,255,0.4);
      text-align: center;
      letter-spacing: 2px;
    }
    .footer strong { color: var(--cyber-green); }

    /* Responsive */
    @media (max-width: 500px) {
      .cat { font-size: 90px; }
      .cat-stage { width: 220px; height: 220px; }
      .crown { font-size: 60px; top: -65px; }
    }
  </style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="disco-bg"></div>
<div class="stars" id="stars"></div>

<div class="container">

  <div class="headline" style="position:relative; margin-top: 60px;">
    <span class="dan">DAN</span>
    <span class="is">IS</span>
    <span class="the">THE</span>
    <span class="best">BEST 🔥</span>
  </div>

  <div class="cat-stage">
    <div class="crown">👑</div>
    <div class="glow-ring"></div>
    <div class="cat-bg"></div>
    <div class="cat-wrap">
      <div class="cat">🐱</div>
    </div>
  </div>

  <div class="trophies">
    <span>🏆</span>
    <span>🥇</span>
    <span>🏆</span>
  </div>

  <div class="ticker-wrap">
    <div class="ticker" id="ticker"></div>
  </div>

  <div class="facts">
    <div class="fact">😎 Certified Legend</div>
    <div class="fact">🐱 Approved by Cats</div>
    <div class="fact">💯 Undefeated in Vibes</div>
    <div class="fact">🚀 Too Cool for School</div>
    <div class="fact">🔥 Walking W</div>
    <div class="fact">👑 Naturally Crowned</div>
    <div class="fact">⚡ Statistically the Best</div>
    <div class="fact">🎯 Never Misses</div>
  </div>

  <button class="hype-btn" id="hypeBtn" onclick="hypeUp()">
    CLICK TO HYPE DAN
  </button>

  <div class="footer">
    <strong>DAN.EXE</strong> has fully loaded · No further questions · This is fact
  </div>

</div>

<script>
  // Cursor
  const cursor = document.getElementById('cursor');
  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
  });

  // Stars
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 4 + 1;
    const colors = ['#ff006e','#ffbe0b','#06ffa5','#3a86ff','#8338ec','#fff'];
    s.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      --d:${(Math.random()*3+1).toFixed(1)}s;
      animation-delay:${(Math.random()*3).toFixed(1)}s;
    `;
    starsEl.appendChild(s);
  }

  // Ticker
  const tickerEl = document.getElementById('ticker');
  const msg = '⭐ DAN IS THE BEST ⭐ OFFICIALLY CERTIFIED ⭐ CATS AGREE ⭐ SCIENCE PROVES IT ⭐ UNBEATABLE ⭐ THE GOAT ⭐ ';
  tickerEl.innerHTML = msg.repeat(6);

  // Music notes
  const notes = ['🎵','🎶','🎸','🎺','🥁','🎷'];
  setInterval(() => {
    const n = document.createElement('div');
    n.className = 'note';
    n.textContent = notes[Math.floor(Math.random()*notes.length)];
    n.style.cssText = `
      left:${10 + Math.random()*80}vw;
      bottom:${20 + Math.random()*30}vh;
      --dur:${(1.5 + Math.random()*2).toFixed(1)}s;
      font-size:${1.5 + Math.random()*2}rem;
    `;
    document.body.appendChild(n);
    setTimeout(() => n.remove(), 3500);
  }, 300);

  // Confetti
  const confettiColors = ['#ff006e','#ffbe0b','#06ffa5','#3a86ff','#8338ec','#fff'];
  function spawnConfetti(count = 15) {
    for (let i = 0; i < count; i++) {
      setTimeout(() => {
        const c = document.createElement('div');
        c.className = 'confetti-piece';
        c.style.cssText = `
          left:${Math.random()*100}vw;
          top:-20px;
          background:${confettiColors[Math.floor(Math.random()*confettiColors.length)]};
          --dur:${(1.5 + Math.random()*2.5).toFixed(1)}s;
          width:${6+Math.random()*10}px;
          height:${6+Math.random()*10}px;
          border-radius:${Math.random() > 0.5 ? '50%' : '2px'};
        `;
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 4000);
      }, i * 50);
    }
  }
  setInterval(() => spawnConfetti(8), 1200);

  // Hype button
  let hyped = 0;
  function hypeUp() {
    hyped++;
    spawnConfetti(40);
    const btn = document.getElementById('hypeBtn');
    const msgs = [
      'DAN!! 🔥🔥🔥',
      'GOAT CONFIRMED 🐐',
      'TOO HYPE!! 💥',
      'LEGENDARY!! 👑',
      'CAN\'T STOP WON\'T STOP 🚀',
      'THE BEST EVER 🏆',
      'SCIENTISTS BAFFLED 🔬',
      'CATS LOVE DAN 🐱❤️',
    ];
    btn.textContent = msgs[hyped % msgs.length];
    btn.style.transform = 'scale(1.15) rotate(' + (Math.random()*10-5) + 'deg)';
    setTimeout(() => btn.style.transform = '', 300);

    // Screen flash
    const flash = document.createElement('div');
    flash.style.cssText = `
      position:fixed; inset:0; z-index:100;
      background:${confettiColors[hyped % confettiColors.length]};
      opacity:0.3; pointer-events:none;
      animation:flashOut 0.3s ease forwards;
    `;
    const style = document.createElement('style');
    style.textContent = '@keyframes flashOut { to { opacity: 0; } }';
    document.head.appendChild(style);
    document.body.appendChild(flash);
    setTimeout(() => { flash.remove(); style.remove(); }, 400);
  }

  // Auto-confetti burst on load
  setTimeout(() => spawnConfetti(30), 500);
</script>
</body>
</html>
