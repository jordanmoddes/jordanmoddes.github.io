<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DocTrack Labels — Avery 5163 / 5963</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet"/>

  <!--
  ============================================================
    IP OF JORDAN MODDES
    DocTrack Label Generator v3.0
    Designed & Built by Jordan Moddes | jordanmoddes.com
    For: Cerilliant / MilliporeSigma — Internal Use Only

    Hamburger-cut barcode labels for Avery 5163 / 5963.
    4"×2" label → split vertically → two 2"×2" halves.

    Each half is a "portrait" layout:
      - Part number on top
      - Barcode below
    Then the ENTIRE half is rotated:
      - Left half:  rotated -90° (reads bottom-to-top)
      - Right half: rotated +90° (reads top-to-bottom)

    This keeps part number + barcode in correct orientation
    relative to each other regardless of how the label is held.
  ============================================================
  -->

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0e13;
      color: #d0e4f0;
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      padding: 40px 20px;
    }

    h1 {
      font-family: 'Share Tech Mono', monospace;
      font-size: 2rem;
      color: #00c8ff;
      letter-spacing: 3px;
      text-align: center;
      margin-bottom: 8px;
    }
    .subtitle {
      text-align: center;
      color: #4a6070;
      font-size: 0.9rem;
      letter-spacing: 2px;
      margin-bottom: 40px;
      text-transform: uppercase;
    }

    .container { max-width: 900px; margin: 0 auto; }

    .card {
      background: #111820;
      border: 1px solid #1e2d3d;
      border-radius: 8px;
      padding: 28px;
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.8rem;
      color: #4a6070;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      background: #0a0e13;
      border: 1px solid #1e2d3d;
      border-radius: 4px;
      color: #d0e4f0;
      font-family: 'Share Tech Mono', monospace;
      font-size: 1rem;
      padding: 12px 14px;
      min-height: 200px;
      resize: vertical;
      outline: none;
    }
    textarea:focus { border-color: #00c8ff; }

    /* Slot picker matches physical sheet layout */
    .sheet-picker {
      display: grid;
      grid-template-columns: 1fr 1fr 20px 1fr 1fr;
      grid-template-rows: repeat(5, 50px);
      gap: 6px 4px;
      margin-bottom: 12px;
      max-width: 500px;
    }

    .slot-cell {
      background: #0a0e13;
      border: 1px solid #1e2d3d;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.95rem;
      color: #4a6070;
      cursor: pointer;
      user-select: none;
      transition: all 0.1s;
    }
    .slot-cell.gap { background: transparent; border: none; cursor: default; }
    .slot-cell:not(.gap):hover { border-color: #4a6070; color: #d0e4f0; }
    .slot-cell.selected {
      background: #00c8ff;
      color: #0a0e13;
      border-color: #00c8ff;
      font-weight: 700;
    }
    .slot-cell.filled {
      background: #1e2d3d;
      border-color: #00ff9d;
      color: #00ff9d;
    }
    .slot-cell.filled.selected {
      background: #00c8ff;
      color: #0a0e13;
      border-color: #00c8ff;
    }

    .slot-hint {
      font-size: 0.75rem;
      color: #4a6070;
      font-family: 'Share Tech Mono', monospace;
      margin-bottom: 16px;
      letter-spacing: 1px;
    }

    .btn-row { display: flex; gap: 12px; flex-wrap: wrap; }

    button {
      background: #00c8ff;
      border: none;
      color: #000;
      font-family: 'Barlow', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 13px 26px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
    }
    button:hover { background: #33d6ff; transform: translateY(-1px); }
    button.secondary {
      background: transparent;
      border: 1px solid #1e2d3d;
      color: #4a6070;
    }
    button.secondary:hover { border-color: #00c8ff; color: #00c8ff; }
    button.print { background: #00ff9d; }
    button.print:hover { background: #33ffb5; }

    .info {
      font-size: 0.85rem;
      color: #4a6070;
      font-family: 'Share Tech Mono', monospace;
      margin-top: 12px;
      letter-spacing: 1px;
    }

    /* ============================================================
       PRINT SHEET — exact physical dimensions for Avery 5163/5963
    ============================================================ */
    .print-sheet {
      display: none;
      width: 8.5in;
      height: 11in;
      padding-top:    0.5in;
      padding-bottom: 0.5in;
      padding-left:   0.15625in;
      padding-right:  0.15625in;
      background: white;
    }

    .print-grid {
      display: grid;
      grid-template-columns: 4in 0.1875in 4in;
      grid-template-rows: repeat(5, 2in);
      width: 100%;
      height: 100%;
    }

    .label {
      width: 4in;
      height: 2in;
      display: grid;
      grid-template-columns: 2in 2in;
      position: relative;
    }

    /* Vertical cut line between the two halves */
    .label.filled::after {
      content: '';
      position: absolute;
      top: 0.08in;
      bottom: 0.08in;
      left: 2in;
      width: 0;
      border-left: 1px dashed #888;
    }

    /* ============================================================
       HALF-SLOT — container at 2"×2"
       We rotate the INNER content as a unit so part number and
       barcode both stay in proper relationship to each other.
    ============================================================ */
    .half {
      width: 2in;
      height: 2in;
      position: relative;
      overflow: hidden;
    }

    /* Inner content: natural 2" wide × 2" tall layout
       (part number on top, barcode below).
       We rotate this whole block 90° in either direction. */
    .half-content {
      position: absolute;
      /* Before rotation, treat the content as 2" wide × 2" tall
         placed at center; after rotation, it fills the 2×2 box. */
      width: 2in;
      height: 2in;
      top: 0;
      left: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0.1in;
    }

    /* LEFT half: rotate -90° (counter-clockwise)
       → content reads bottom-to-top
       → barcode, after rotation, becomes vertical bars */
    .half.left .half-content {
      transform: rotate(-90deg);
      transform-origin: center center;
    }

    /* RIGHT half: rotate +90° (clockwise)
       → content reads top-to-bottom */
    .half.right .half-content {
      transform: rotate(90deg);
      transform-origin: center center;
    }

    .part-text {
      font-family: 'Courier New', monospace;
      font-size: 11pt;
      font-weight: bold;
      color: #000;
      text-align: center;
      margin-bottom: 0.08in;
      white-space: nowrap;
      max-width: 1.9in;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .barcode-wrap {
      width: 1.8in;
      display: flex;
      justify-content: center;
    }
    .barcode-wrap svg {
      width: 1.8in;
      height: 1in;
    }

    @media print {
      @page { size: letter; margin: 0; }
      body { background: white; padding: 0; margin: 0; }
      .no-print { display: none !important; }
      .print-sheet {
        display: block !important;
        page-break-after: always;
      }
    }

    footer {
      text-align: center;
      padding: 24px;
      font-size: 0.7rem;
      color: #1e2d3d;
      font-family: 'Share Tech Mono', monospace;
      letter-spacing: 1px;
    }
    footer a { color: #00c8ff; text-decoration: none; }
  </style>
</head>
<body>

<div class="no-print">
  <div class="container">
    <h1>DOCTRACK LABELS</h1>
    <div class="subtitle">Avery 5163 / 5963 — Hamburger Cut — 20 Per Sheet</div>

    <div class="card">
      <label for="parts-input">Part Numbers — One Per Line</label>
      <textarea id="parts-input" placeholder="PHR2363-3X75MG&#10;CRM46916&#10;PHR1208-1.2ML&#10;..."></textarea>
      <div class="info" id="parts-count">0 part numbers entered</div>
    </div>

    <div class="card">
      <label>Starting Slot — Click Where Printing Should Begin</label>
      <div class="slot-hint">
        Layout matches your physical sheet. Numbers read left-to-right across each row.
      </div>
      <div class="sheet-picker" id="slot-grid"></div>
      <div class="info" id="slot-info">Selected: slot 1 (default)</div>
    </div>

    <div class="card">
      <div class="btn-row">
        <button onclick="generateLabels()">Generate Preview</button>
        <button class="print" onclick="window.print()" id="print-btn" disabled style="opacity:0.4;">Print Labels</button>
        <button class="secondary" onclick="clearAll()">Clear</button>
      </div>
      <div class="info" id="generate-info">Enter part numbers and click Generate.</div>
    </div>
  </div>

  <footer>
    IP OF JORDAN MODDES &nbsp;|&nbsp; <a href="https://jordanmoddes.com">jordanmoddes.com</a> &nbsp;|&nbsp; INTERNAL USE ONLY
  </footer>
</div>

<div class="print-sheet" id="print-sheet">
  <div class="print-grid" id="print-grid"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>

<script>
  // ============================================================
  //  STATE
  // ============================================================
  let selectedSlot = 1;

  // ============================================================
  //  BUILD SLOT PICKER — matches physical sheet
  //  5 rows × 4 slots per row with a visual gap mid-row
  // ============================================================
  function buildSlotGrid() {
    const grid = document.getElementById('slot-grid');
    grid.innerHTML = '';

    for (let row = 0; row < 5; row++) {
      const baseLeft = row * 4 + 1;
      const slots = [
        baseLeft,      // left-half of left label
        baseLeft + 1,  // right-half of left label
        'gap',
        baseLeft + 2,  // left-half of right label
        baseLeft + 3,  // right-half of right label
      ];

      slots.forEach(s => {
        const cell = document.createElement('div');
        if (s === 'gap') {
          cell.className = 'slot-cell gap';
        } else {
          cell.className = 'slot-cell';
          cell.textContent = s;
          cell.dataset.slot = s;
          if (s === selectedSlot) cell.classList.add('selected');
          cell.onclick = () => selectSlot(s);
        }
        grid.appendChild(cell);
      });
    }
  }

  function selectSlot(n) {
    selectedSlot = n;
    document.querySelectorAll('.slot-cell').forEach(c => {
      if (c.classList.contains('gap')) return;
      c.classList.toggle('selected', parseInt(c.dataset.slot) === n);
    });
    document.getElementById('slot-info').textContent = `Selected: slot ${n}`;
  }

  // ============================================================
  //  PARSE PART NUMBERS
  // ============================================================
  function getPartNumbers() {
    const raw = document.getElementById('parts-input').value;
    return raw.split('\n').map(p => p.trim()).filter(p => p.length > 0);
  }

  document.getElementById('parts-input').addEventListener('input', () => {
    const count = getPartNumbers().length;
    document.getElementById('parts-count').textContent =
      `${count} part number${count !== 1 ? 's' : ''} entered`;
  });

  // ============================================================
  //  GENERATE LABELS
  // ============================================================
  function generateLabels() {
    const parts = getPartNumbers();

    if (parts.length === 0) {
      document.getElementById('generate-info').textContent = '⚠ Enter at least one part number.';
      return;
    }

    const filledSlots = {};
    for (let i = 0; i < parts.length; i++) {
      const slot = selectedSlot + i;
      if (slot > 20) {
        document.getElementById('generate-info').textContent =
          `⚠ Only ${20 - selectedSlot + 1} slots available starting at slot ${selectedSlot}.`;
        return;
      }
      filledSlots[slot] = parts[i];
    }

    // Mark picker visually
    document.querySelectorAll('.slot-cell').forEach(c => {
      if (c.classList.contains('gap')) return;
      const slot = parseInt(c.dataset.slot);
      c.classList.toggle('filled', !!filledSlots[slot]);
    });

    // Build print grid
    const grid = document.getElementById('print-grid');
    grid.innerHTML = '';

    for (let row = 0; row < 5; row++) {
      const baseSlot = row * 4 + 1;

      // LEFT label on sheet = slots baseSlot, baseSlot+1
      grid.appendChild(buildLabel(filledSlots[baseSlot], filledSlots[baseSlot + 1]));

      if (row === 0) {
        const gap = document.createElement('div');
        gap.style.gridColumn = '2';
        gap.style.gridRow = '1 / -1';
        grid.appendChild(gap);
      }

      // RIGHT label on sheet = slots baseSlot+2, baseSlot+3
      grid.appendChild(buildLabel(filledSlots[baseSlot + 2], filledSlots[baseSlot + 3]));
    }

    // Render all barcodes (JsBarcode handles Code 128 correctly)
    document.querySelectorAll('.barcode-wrap svg').forEach(svg => {
      const partNum = svg.dataset.part;
      try {
        JsBarcode(svg, partNum, {
          format:       'CODE128',
          width:        1.6,
          height:       60,
          displayValue: false,
          margin:       0,
        });
      } catch (err) {
        console.error('Barcode error for', partNum, err);
      }
    });

    const printBtn = document.getElementById('print-btn');
    printBtn.disabled = false;
    printBtn.style.opacity = '1';

    document.getElementById('generate-info').textContent =
      `✓ ${parts.length} label${parts.length !== 1 ? 's' : ''} generated in slots ${selectedSlot}-${selectedSlot + parts.length - 1}. Click Print.`;
  }

  // ============================================================
  //  BUILD ONE LABEL (2 halves side by side)
  //  The content inside each half is a simple stacked layout:
  //    part text on top, barcode below
  //  Then the whole half is rotated -90° (left) or +90° (right)
  //  so everything flows in the same direction after cutting.
  // ============================================================
  function buildLabel(leftPart, rightPart) {
    const label = document.createElement('div');
    label.className = 'label';
    if (leftPart || rightPart) label.classList.add('filled');

    // Left half
    const left = document.createElement('div');
    left.className = 'half left';
    if (leftPart) {
      left.innerHTML = `
        <div class="half-content">
          <div class="part-text">${escapeHtml(leftPart)}</div>
          <div class="barcode-wrap"><svg data-part="${escapeHtml(leftPart)}"></svg></div>
        </div>
      `;
    }
    label.appendChild(left);

    // Right half
    const right = document.createElement('div');
    right.className = 'half right';
    if (rightPart) {
      right.innerHTML = `
        <div class="half-content">
          <div class="part-text">${escapeHtml(rightPart)}</div>
          <div class="barcode-wrap"><svg data-part="${escapeHtml(rightPart)}"></svg></div>
        </div>
      `;
    }
    label.appendChild(right);

    return label;
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function clearAll() {
    document.getElementById('parts-input').value = '';
    document.getElementById('parts-count').textContent = '0 part numbers entered';
    document.getElementById('print-grid').innerHTML = '';
    document.querySelectorAll('.slot-cell').forEach(c => c.classList.remove('filled'));
    selectSlot(1);
    document.getElementById('print-btn').disabled = true;
    document.getElementById('print-btn').style.opacity = '0.4';
    document.getElementById('generate-info').textContent = 'Enter part numbers and click Generate.';
  }

  buildSlotGrid();
</script>

</body>
</html>
