<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DocTrack Labels — Avery 5163 / 5963</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet"/>

  <!--
  ============================================================
    IP OF JORDAN MODDES
    DocTrack Label Generator v2.0
    Designed & Built by Jordan Moddes | jordanmoddes.com
    For: Cerilliant / MilliporeSigma — Internal Use Only

    Hamburger-cut barcode labels for Avery 5163 / 5963.

    Each full 4"x2" label is split VERTICALLY into two 2"x2" halves.
    Each half:
      - Part number runs vertically along the OUTSIDE (rounded) edge
      - Barcode sits next to the CUT edge, readable horizontally
    Left half:  part text reads bottom-to-top (rotated 90° CCW)
    Right half: part text reads top-to-bottom (rotated 90° CW)

    Slot numbering (matches physical sheet, read row-by-row L-to-R):
      1   2  |  3   4      ← row 1 (left label=1,2, right label=3,4)
      5   6  |  7   8      ← row 2
      9  10  | 11  12      ← row 3
     13  14  | 15  16      ← row 4
     17  18  | 19  20      ← row 5
  ============================================================
  -->

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0e13;
      color: #d0e4f0;
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      padding: 40px 20px;
    }

    h1 {
      font-family: 'Share Tech Mono', monospace;
      font-size: 2rem;
      color: #00c8ff;
      letter-spacing: 3px;
      text-align: center;
      margin-bottom: 8px;
    }
    .subtitle {
      text-align: center;
      color: #4a6070;
      font-size: 0.9rem;
      letter-spacing: 2px;
      margin-bottom: 40px;
      text-transform: uppercase;
    }

    .container { max-width: 900px; margin: 0 auto; }

    .card {
      background: #111820;
      border: 1px solid #1e2d3d;
      border-radius: 8px;
      padding: 28px;
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.8rem;
      color: #4a6070;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      background: #0a0e13;
      border: 1px solid #1e2d3d;
      border-radius: 4px;
      color: #d0e4f0;
      font-family: 'Share Tech Mono', monospace;
      font-size: 1rem;
      padding: 12px 14px;
      min-height: 200px;
      resize: vertical;
      outline: none;
    }
    textarea:focus { border-color: #00c8ff; }

    /* ============================================================
       SLOT PICKER — matches physical sheet layout
       5 rows × 2 label-groups per row, each group has 2 halves
       Total 20 slots. Gap between label groups to match real sheet.
    ============================================================ */
    .sheet-picker {
      display: grid;
      grid-template-columns: 1fr 1fr 20px 1fr 1fr;  /* 2 halves | gap | 2 halves */
      grid-template-rows: repeat(5, 50px);
      gap: 6px 4px;
      margin-bottom: 12px;
      max-width: 500px;
    }

    .slot-cell {
      background: #0a0e13;
      border: 1px solid #1e2d3d;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.95rem;
      color: #4a6070;
      cursor: pointer;
      user-select: none;
      transition: all 0.1s;
    }
    .slot-cell.gap {
      background: transparent;
      border: none;
      cursor: default;
    }
    .slot-cell:not(.gap):hover { border-color: #4a6070; color: #d0e4f0; }
    .slot-cell.selected {
      background: #00c8ff;
      color: #0a0e13;
      border-color: #00c8ff;
      font-weight: 700;
    }
    .slot-cell.filled {
      background: #1e2d3d;
      border-color: #00ff9d;
      color: #00ff9d;
    }
    .slot-cell.filled.selected {
      background: #00c8ff;
      color: #0a0e13;
      border-color: #00c8ff;
    }

    .slot-hint {
      font-size: 0.75rem;
      color: #4a6070;
      font-family: 'Share Tech Mono', monospace;
      margin-bottom: 16px;
      letter-spacing: 1px;
    }

    .btn-row { display: flex; gap: 12px; flex-wrap: wrap; }

    button {
      background: #00c8ff;
      border: none;
      color: #000;
      font-family: 'Barlow', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 13px 26px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
    }
    button:hover { background: #33d6ff; transform: translateY(-1px); }
    button.secondary {
      background: transparent;
      border: 1px solid #1e2d3d;
      color: #4a6070;
    }
    button.secondary:hover { border-color: #00c8ff; color: #00c8ff; }
    button.print { background: #00ff9d; }
    button.print:hover { background: #33ffb5; }

    .info {
      font-size: 0.85rem;
      color: #4a6070;
      font-family: 'Share Tech Mono', monospace;
      margin-top: 12px;
      letter-spacing: 1px;
    }

    /* ============================================================
       PRINT SHEET — this is what prints on the Avery paper
       All measurements in inches for exact physical alignment
    ============================================================ */
    .print-sheet {
      display: none;
      width: 8.5in;
      height: 11in;
      padding-top:    0.5in;
      padding-bottom: 0.5in;
      padding-left:   0.15625in;
      padding-right:  0.15625in;
      background: white;
      position: relative;
    }

    .print-grid {
      display: grid;
      grid-template-columns: 4in 0.1875in 4in;
      grid-template-rows: repeat(5, 2in);
      width: 100%;
      height: 100%;
    }

    /* Each physical Avery label = 4" × 2", split vertically */
    .label {
      width: 4in;
      height: 2in;
      display: grid;
      grid-template-columns: 2in 2in;
      position: relative;
    }

    /* Half = 2" × 2" */
    .half {
      width: 2in;
      height: 2in;
      display: grid;
      grid-template-columns: 0.3in 1.7in;  /* narrow text column, wide barcode column */
      align-items: center;
      padding: 0.1in 0.08in;
      overflow: hidden;
    }

    /* Right half reverses the columns so barcode is on the LEFT (cut side)
       and text is on the RIGHT (rounded corner side) */
    .half.right {
      grid-template-columns: 1.7in 0.3in;
    }

    /* Vertical cut line down the middle of each label */
    .label.filled::after {
      content: '';
      position: absolute;
      top: 0.1in;
      bottom: 0.1in;
      left: 2in;
      width: 0;
      border-left: 1px dashed #888;
    }

    /* ============================================================
       PART NUMBER TEXT — vertical orientation
       Left half: rotated 90° counter-clockwise (reads bottom-to-top)
       Right half: rotated 90° clockwise (reads top-to-bottom)
    ============================================================ */
    .part-text {
      font-family: 'Courier New', monospace;
      font-size: 11pt;
      font-weight: bold;
      color: #000;
      white-space: nowrap;
      text-align: center;
      overflow: hidden;
    }
    .half.left .part-text {
      transform: rotate(-90deg);
      transform-origin: center;
      width: 1.7in;      /* after rotation, this becomes the height */
      margin-left: -0.7in; /* center it in the narrow column */
    }
    .half.right .part-text {
      transform: rotate(90deg);
      transform-origin: center;
      width: 1.7in;
      margin-left: -0.7in;
      grid-column: 2;     /* put text in right column */
    }

    .barcode-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .half.left  .barcode-wrap { grid-column: 2; }
    .half.right .barcode-wrap { grid-column: 1; }
    .barcode-wrap svg {
      max-width: 1.6in;
      height: 1.5in;
    }

    /* ============================================================
       PRINT MEDIA QUERY
    ============================================================ */
    @media print {
      @page { size: letter; margin: 0; }
      body { background: white; padding: 0; margin: 0; }
      .no-print { display: none !important; }
      .print-sheet {
        display: block !important;
        page-break-after: always;
      }
    }

    footer {
      text-align: center;
      padding: 24px;
      font-size: 0.7rem;
      color: #1e2d3d;
      font-family: 'Share Tech Mono', monospace;
      letter-spacing: 1px;
    }
    footer a { color: #00c8ff; text-decoration: none; }
  </style>
</head>
<body>

<div class="no-print">
  <div class="container">
    <h1>DOCTRACK LABELS</h1>
    <div class="subtitle">Avery 5163 / 5963 — Hamburger Cut — 20 Per Sheet</div>

    <div class="card">
      <label for="parts-input">Part Numbers — One Per Line</label>
      <textarea id="parts-input" placeholder="PHR2363-3X75MG&#10;CRM46916&#10;PHR1208-1.2ML&#10;..."></textarea>
      <div class="info" id="parts-count">0 part numbers entered</div>
    </div>

    <div class="card">
      <label>Starting Slot — Click Where Printing Should Begin</label>
      <div class="slot-hint">
        Layout matches your physical sheet. Numbers read left-to-right across each row.
      </div>
      <div class="sheet-picker" id="slot-grid"></div>
      <div class="info" id="slot-info">Selected: slot 1 (default)</div>
    </div>

    <div class="card">
      <div class="btn-row">
        <button onclick="generateLabels()">Generate Preview</button>
        <button class="print" onclick="window.print()" id="print-btn" disabled style="opacity:0.4;">Print Labels</button>
        <button class="secondary" onclick="clearAll()">Clear</button>
      </div>
      <div class="info" id="generate-info">Enter part numbers and click Generate.</div>
    </div>
  </div>

  <footer>
    IP OF JORDAN MODDES &nbsp;|&nbsp; <a href="https://jordanmoddes.com">jordanmoddes.com</a> &nbsp;|&nbsp; INTERNAL USE ONLY
  </footer>
</div>

<!-- Print sheet -->
<div class="print-sheet" id="print-sheet">
  <div class="print-grid" id="print-grid"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>

<script>
  // ============================================================
  //  STATE
  // ============================================================
  let selectedSlot = 1;

  // ============================================================
  //  SLOT PICKER — matches physical sheet
  //  5 rows × 4 slots per row, with a visual gap between left
  //  label (slots 1-2) and right label (slots 3-4) each row.
  //
  //  Grid columns: | half | half | GAP | half | half |
  //  Row 1: slots 1, 2, (gap), 3, 4
  //  Row 2: slots 5, 6, (gap), 7, 8
  //  Row 3: slots 9, 10, (gap), 11, 12
  //  Row 4: slots 13, 14, (gap), 15, 16
  //  Row 5: slots 17, 18, (gap), 19, 20
  // ============================================================
  function buildSlotGrid() {
    const grid = document.getElementById('slot-grid');
    grid.innerHTML = '';

    for (let row = 0; row < 5; row++) {
      const baseLeft = row * 4 + 1;   // left-label slots per row: 1, 5, 9, 13, 17
      const slots = [
        baseLeft,      // left-half of left label
        baseLeft + 1,  // right-half of left label
        'gap',         // visual gap
        baseLeft + 2,  // left-half of right label
        baseLeft + 3,  // right-half of right label
      ];

      slots.forEach(s => {
        const cell = document.createElement('div');
        if (s === 'gap') {
          cell.className = 'slot-cell gap';
        } else {
          cell.className = 'slot-cell';
          cell.textContent = s;
          cell.dataset.slot = s;
          if (s === selectedSlot) cell.classList.add('selected');
          cell.onclick = () => selectSlot(s);
        }
        grid.appendChild(cell);
      });
    }
  }

  function selectSlot(n) {
    selectedSlot = n;
    document.querySelectorAll('.slot-cell').forEach(c => {
      if (c.classList.contains('gap')) return;
      c.classList.toggle('selected', parseInt(c.dataset.slot) === n);
    });
    document.getElementById('slot-info').textContent = `Selected: slot ${n}`;
  }

  // ============================================================
  //  PARSE PART NUMBERS
  // ============================================================
  function getPartNumbers() {
    const raw = document.getElementById('parts-input').value;
    return raw.split('\n').map(p => p.trim()).filter(p => p.length > 0);
  }

  document.getElementById('parts-input').addEventListener('input', () => {
    const count = getPartNumbers().length;
    document.getElementById('parts-count').textContent =
      `${count} part number${count !== 1 ? 's' : ''} entered`;
  });

  // ============================================================
  //  SLOT → POSITION
  //  Given slot 1-20, determine row (0-4), which label (left/right
  //  on the Avery sheet), and which half (left/right within label)
  //
  //  Slots 1,2   = row 0, left label   (1=leftHalf, 2=rightHalf)
  //  Slots 3,4   = row 0, right label
  //  Slots 5,6   = row 1, left label
  //  ...and so on
  // ============================================================
  function slotToPosition(slot) {
    const row = Math.floor((slot - 1) / 4);           // 0-4
    const withinRow = ((slot - 1) % 4) + 1;           // 1-4
    const isLeftLabel = withinRow <= 2;
    const isLeftHalf  = (withinRow % 2) === 1;        // odd slots = left half
    return { row, isLeftLabel, isLeftHalf };
  }

  // ============================================================
  //  GENERATE LABELS
  // ============================================================
  function generateLabels() {
    const parts = getPartNumbers();

    if (parts.length === 0) {
      document.getElementById('generate-info').textContent = '⚠ Enter at least one part number.';
      return;
    }

    // Map each part to a slot starting from selectedSlot
    const filledSlots = {};
    for (let i = 0; i < parts.length; i++) {
      const slot = selectedSlot + i;
      if (slot > 20) {
        document.getElementById('generate-info').textContent =
          `⚠ Only ${20 - selectedSlot + 1} slots available starting at slot ${selectedSlot}.`;
        return;
      }
      filledSlots[slot] = parts[i];
    }

    // Mark picker visually
    document.querySelectorAll('.slot-cell').forEach(c => {
      if (c.classList.contains('gap')) return;
      const slot = parseInt(c.dataset.slot);
      c.classList.toggle('filled', !!filledSlots[slot]);
    });

    // Build the print grid — 5 rows × 3 cols (leftLabel | gap | rightLabel)
    const grid = document.getElementById('print-grid');
    grid.innerHTML = '';

    for (let row = 0; row < 5; row++) {
      const baseSlot = row * 4 + 1;

      // LEFT label on the sheet = slots baseSlot, baseSlot+1
      const leftLabel = buildLabel(filledSlots[baseSlot], filledSlots[baseSlot + 1]);
      grid.appendChild(leftLabel);

      // GAP (added once, spans all rows)
      if (row === 0) {
        const gap = document.createElement('div');
        gap.style.gridColumn = '2';
        gap.style.gridRow = '1 / -1';
        grid.appendChild(gap);
      }

      // RIGHT label on the sheet = slots baseSlot+2, baseSlot+3
      const rightLabel = buildLabel(filledSlots[baseSlot + 2], filledSlots[baseSlot + 3]);
      grid.appendChild(rightLabel);
    }

    // Render all barcodes
    document.querySelectorAll('.barcode-wrap svg').forEach(svg => {
      const partNum = svg.dataset.part;
      try {
        JsBarcode(svg, partNum, {
          format:       'CODE128',
          width:        1.6,
          height:       80,
          displayValue: false,
          margin:       0,
        });
      } catch (err) {
        console.error('Barcode error for', partNum, err);
      }
    });

    // Enable print
    const printBtn = document.getElementById('print-btn');
    printBtn.disabled = false;
    printBtn.style.opacity = '1';

    document.getElementById('generate-info').textContent =
      `✓ ${parts.length} label${parts.length !== 1 ? 's' : ''} generated in slots ${selectedSlot}-${selectedSlot + parts.length - 1}. Click Print.`;
  }

  // ============================================================
  //  BUILD ONE PHYSICAL LABEL (2 halves side-by-side)
  //  leftPart = slot for LEFT half (part text rotated -90°)
  //  rightPart = slot for RIGHT half (part text rotated +90°)
  // ============================================================
  function buildLabel(leftPart, rightPart) {
    const label = document.createElement('div');
    label.className = 'label';
    if (leftPart || rightPart) label.classList.add('filled');

    // LEFT half: part text on outside (left), barcode on cut side (right)
    const left = document.createElement('div');
    left.className = 'half left';
    if (leftPart) {
      left.innerHTML = `
        <div class="part-text">${escapeHtml(leftPart)}</div>
        <div class="barcode-wrap"><svg data-part="${escapeHtml(leftPart)}"></svg></div>
      `;
    }
    label.appendChild(left);

    // RIGHT half: barcode on cut side (left), part text on outside (right)
    const right = document.createElement('div');
    right.className = 'half right';
    if (rightPart) {
      right.innerHTML = `
        <div class="barcode-wrap"><svg data-part="${escapeHtml(rightPart)}"></svg></div>
        <div class="part-text">${escapeHtml(rightPart)}</div>
      `;
    }
    label.appendChild(right);

    return label;
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  // ============================================================
  //  CLEAR
  // ============================================================
  function clearAll() {
    document.getElementById('parts-input').value = '';
    document.getElementById('parts-count').textContent = '0 part numbers entered';
    document.getElementById('print-grid').innerHTML = '';
    document.querySelectorAll('.slot-cell').forEach(c => c.classList.remove('filled'));
    selectSlot(1);
    document.getElementById('print-btn').disabled = true;
    document.getElementById('print-btn').style.opacity = '0.4';
    document.getElementById('generate-info').textContent = 'Enter part numbers and click Generate.';
  }

  // ============================================================
  //  INIT
  // ============================================================
  buildSlotGrid();
</script>

</body>
</html>
