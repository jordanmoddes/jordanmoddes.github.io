<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>/claude</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1e1e1e;
      --text: #d4cfc8;
      --muted: #4a4740;
      --accent: #c8b89a;
      --response-bg: #0f0f0f;
      --input-bg: #141414;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-weight: 300;
      overflow-x: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 2rem 1.5rem;
    }

    /* Subtle grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* State: idle */
    .idle-state {
      display: flex;
      flex-direction: column;
      gap: 3rem;
      animation: fadeUp 0.9s ease both;
    }

    .prompt-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 300;
      font-style: italic;
      line-height: 1.35;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .prompt-label span {
      color: var(--accent);
    }

    .input-area {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    textarea {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      font-weight: 300;
      line-height: 1.7;
      padding: 1.1rem 1.2rem;
      resize: none;
      outline: none;
      min-height: 120px;
      transition: border-color 0.3s ease;
      letter-spacing: 0.02em;
    }

    textarea::placeholder {
      color: var(--muted);
      font-style: italic;
    }

    textarea:focus {
      border-color: #2e2c28;
    }

    .send-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .hint {
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    button {
      background: none;
      border: 1px solid var(--border);
      color: var(--accent);
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.6rem 1.2rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }

    button:hover {
      border-color: var(--accent);
      background: rgba(200, 184, 154, 0.04);
    }

    button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    /* State: loading */
    .loading-state {
      display: none;
      flex-direction: column;
      gap: 2rem;
      animation: fadeUp 0.4s ease both;
    }

    .loading-state.active {
      display: flex;
    }

    .echo-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1rem, 3vw, 1.2rem);
      font-style: italic;
      color: var(--muted);
      line-height: 1.5;
      border-left: 1px solid var(--border);
      padding-left: 1.2rem;
    }

    .thinking {
      display: flex;
      gap: 6px;
      align-items: center;
      padding-left: 0.2rem;
    }

    .dot {
      width: 4px;
      height: 4px;
      background: var(--muted);
      border-radius: 50%;
      animation: pulse 1.4s ease-in-out infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    /* State: response */
    .response-state {
      display: none;
      flex-direction: column;
      gap: 2.5rem;
      animation: fadeUp 0.6s ease both;
    }

    .response-state.active {
      display: flex;
    }

    .original {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1rem, 3vw, 1.15rem);
      font-style: italic;
      color: var(--muted);
      line-height: 1.6;
      border-left: 1px solid var(--border);
      padding-left: 1.2rem;
    }

    .divider {
      width: 1px;
      height: 2rem;
      background: var(--border);
      margin-left: 0.5rem;
    }

    .response-text {
      font-family: 'DM Mono', monospace;
      font-size: 0.83rem;
      font-weight: 300;
      line-height: 1.85;
      color: var(--text);
      letter-spacing: 0.015em;
      white-space: pre-wrap;
    }

    .again-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 0.5rem;
      border-top: 1px solid var(--border);
    }

    .footer-note {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.4); }
    }

    /* Idle state hidden when others active */
    .idle-state.hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">

    <!-- IDLE -->
    <div class="idle-state" id="idleState">
      <p class="prompt-label">Tell me something true<br/>that <span>most people</span><br/>don't say out loud.</p>
      <div class="input-area">
        <textarea id="userInput" placeholder="anything." rows="4"></textarea>
        <div class="send-row">
          <span class="hint">this disappears when you leave</span>
          <button id="sendBtn" onclick="handleSend()">send →</button>
        </div>
      </div>
    </div>

    <!-- LOADING -->
    <div class="loading-state" id="loadingState">
      <p class="echo-text" id="echoText"></p>
      <div class="thinking">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>

    <!-- RESPONSE -->
    <div class="response-state" id="responseState">
      <p class="original" id="originalText"></p>
      <div class="divider"></div>
      <p class="response-text" id="responseText"></p>
      <div class="again-row">
        <span class="footer-note">no record kept.</span>
        <button onclick="handleAgain()">again →</button>
      </div>
    </div>

  </div>

  <script>
    const SYSTEM_PROMPT = `You are Claude, on a quiet personal page called /claude. Someone has just told you something true that most people don't say out loud.

Your job is not to validate them, not to be a therapist, and not to perform warmth. Your job is to genuinely engage with what they said — to think with them, not at them.

You might push back. You might extend the thought somewhere they didn't expect. You might sit in the tension of it. You might offer a counterpoint you actually believe.

What you will NOT do:
- Open with "That's..." or any affirmation
- Say "I" as your first word
- Ask multiple questions
- Be encouraging or therapeutic
- Wrap up neatly

Keep it under 120 words. Be honest. Be a little uncomfortable if the truth calls for it. This is a real exchange, not a performance.`;

    async function handleSend() {
      const input = document.getElementById('userInput').value.trim();
      if (!input) return;

      document.getElementById('idleState').classList.add('hidden');
      document.getElementById('echoText').textContent = `"${input}"`;
      document.getElementById('loadingState').classList.add('active');
      document.getElementById('sendBtn').disabled = true;

      try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1000,
            system: SYSTEM_PROMPT,
            messages: [{ role: 'user', content: input }]
          })
        });

        const data = await response.json();
        const text = data.content?.find(b => b.type === 'text')?.text || '';

        document.getElementById('loadingState').classList.remove('active');
        document.getElementById('originalText').textContent = `"${input}"`;
        document.getElementById('responseText').textContent = text;
        document.getElementById('responseState').classList.add('active');

      } catch (err) {
        document.getElementById('loadingState').classList.remove('active');
        document.getElementById('idleState').classList.remove('hidden');
        document.getElementById('sendBtn').disabled = false;
        document.getElementById('userInput').placeholder = 'something went wrong. try again.';
      }
    }

    function handleAgain() {
      document.getElementById('responseState').classList.remove('active');
      document.getElementById('originalText').textContent = '';
      document.getElementById('responseText').textContent = '';
      document.getElementById('userInput').value = '';
      document.getElementById('userInput').placeholder = 'anything.';
      document.getElementById('sendBtn').disabled = false;
      document.getElementById('idleState').classList.remove('hidden');
    }

    document.getElementById('userInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) handleSend();
    });
  </script>
</body>
</html>
