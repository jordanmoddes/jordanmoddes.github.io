
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Gmas Page</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F7F5F2;
      --surface: #FFFFFF;
      --surface2: #F0EDE8;
      --border: rgba(0,0,0,0.07);
      --text: #1A1A1A;
      --text-soft: #6B6560;
      --text-xsoft: #9E9891;
      --accent: #2D6BE4;
      --accent-light: #EBF1FD;
      --green: #16A34A;
      --green-light: #DCFCE7;
      --amber: #D97706;
      --amber-light: #FEF3C7;
      --rose: #E11D48;
      --rose-light: #FFE4E6;
      --purple: #7C3AED;
      --purple-light: #EDE9FE;
      --r: 14px;
      --r-sm: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--text);
      font-size: 16px;
      line-height: 1.5;
    }

    /* ===== GREETING ===== */
    #greeting {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 48px 32px;
      background: var(--surface);
      z-index: 100;
      transition: opacity 1.6s ease;
    }

    .g-sub { font-size: 13px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-xsoft); margin-bottom: 20px; }
    .g-name { font-size: 42px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
    .g-tagline { font-size: 16px; color: var(--text-soft); font-weight: 500; margin-bottom: 48px; line-height: 1.6; max-width: 280px; }
    .g-heart { font-size: 32px; animation: pulse 2s ease infinite; display: block; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }
    .g-from { font-size: 13px; color: var(--text-xsoft); margin-top: 16px; font-weight: 500; }

    /* ===== LAYOUT ===== */
    #app { max-width: 480px; margin: 0 auto; padding: 0 16px 48px; }

    /* ===== NAV BAR ===== */
    .nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 0 16px;
    }

    .nav-back {
      display: flex; align-items: center; gap: 6px;
      background: none; border: none; cursor: pointer;
      color: var(--accent); font-size: 15px; font-weight: 600;
      font-family: 'Outfit', sans-serif;
      padding: 6px 0;
    }

    .nav-title { font-size: 15px; font-weight: 700; color: var(--text-soft); }

    .streak-badge {
      font-size: 13px; font-weight: 700;
      background: var(--amber-light);
      color: var(--amber);
      padding: 5px 11px; border-radius: 999px;
      border: 1px solid rgba(217,119,6,0.2);
    }

    /* ===== HOME ===== */
    .home-top {
      padding: 32px 0 24px;
    }

    .home-greeting { font-size: 13px; font-weight: 600; color: var(--text-xsoft); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
    .home-title { font-size: 28px; font-weight: 800; color: var(--text); margin-bottom: 6px; line-height: 1.2; }
    .home-sub { font-size: 14px; color: var(--text-soft); font-weight: 500; }

    .streak-row { margin: 20px 0 28px; }

    /* ===== GAME CARDS ===== */
    .game-list { display: flex; flex-direction: column; gap: 12px; }

    .game-tile {
      background: var(--surface);
      border-radius: var(--r);
      padding: 20px;
      border: 1.5px solid var(--border);
      cursor: pointer;
      text-align: left;
      width: 100%;
      font-family: 'Outfit', sans-serif;
      display: flex; align-items: center; gap: 16px;
      transition: all 0.15s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }

    .game-tile:active { transform: scale(0.98); background: var(--surface2); }

    .game-tile-icon {
      width: 48px; height: 48px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
    }

    .game-tile-body { flex: 1; }
    .game-tile-name { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
    .game-tile-desc { font-size: 13px; color: var(--text-soft); font-weight: 500; }
    .game-tile-arrow { color: var(--text-xsoft); font-size: 18px; }

    /* ===== SECTION LABEL ===== */
    .section-label {
      font-size: 11px; font-weight: 700; letter-spacing: 1.2px;
      text-transform: uppercase; color: var(--text-xsoft);
      margin: 24px 0 12px;
    }

    /* ===== MEMORY GAME ===== */
    .mem-bar {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 8px; margin-bottom: 20px;
    }

    .mem-stat {
      background: var(--surface);
      border-radius: var(--r-sm);
      padding: 10px 8px;
      text-align: center;
      border: 1.5px solid var(--border);
    }

    .mem-stat-val { font-size: 20px; font-weight: 800; color: var(--text); }
    .mem-stat-lbl { font-size: 11px; font-weight: 600; color: var(--text-xsoft); text-transform: uppercase; letter-spacing: 0.5px; }

    #memGrid {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 9px;
    }

    .mc {
      aspect-ratio: 1;
      border-radius: 12px;
      cursor: pointer;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.38s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .mc.flipped { transform: rotateY(180deg); }
    .mc.matched { transform: rotateY(180deg); animation: matchBounce 0.3s ease 0.1s; }
    @keyframes matchBounce { 0%{transform:rotateY(180deg) scale(1)} 50%{transform:rotateY(180deg) scale(1.1)} 100%{transform:rotateY(180deg) scale(1)} }

    .mc-f, .mc-b {
      position: absolute; inset: 0;
      border-radius: 12px;
      backface-visibility: hidden;
      display: flex; align-items: center; justify-content: center;
    }

    .mc-f {
      background: #E8E4DF;
      font-size: 13px; font-weight: 800;
      color: #B8B0A8;
      border: 1.5px solid rgba(0,0,0,0.06);
    }

    .mc-b {
      background: var(--surface);
      font-size: clamp(22px, 5.5vw, 28px);
      transform: rotateY(180deg);
      border: 1.5px solid var(--border);
    }

    .mc.matched .mc-b {
      background: var(--green-light);
      border-color: rgba(22,163,74,0.25);
    }

    /* ===== INLINE RESULT ===== */
    .result-box {
      border-radius: var(--r-sm);
      padding: 14px 16px;
      font-size: 14px; font-weight: 600;
      line-height: 1.55;
      margin-top: 16px;
      animation: fadeSlide 0.25s ease;
    }

    @keyframes fadeSlide { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

    .result-box.correct { background: var(--green-light); color: #14532D; border: 1px solid rgba(22,163,74,0.2); }
    .result-box.wrong { background: var(--amber-light); color: #78350F; border: 1px solid rgba(217,119,6,0.2); }

    /* ===== WIN PANEL ===== */
    .win-panel {
      background: var(--surface);
      border-radius: var(--r);
      padding: 28px 24px;
      text-align: center;
      border: 1.5px solid var(--border);
      animation: fadeSlide 0.35s ease;
      margin-top: 16px;
    }

    .win-icon { font-size: 48px; margin-bottom: 12px; display: block; }
    .win-title { font-size: 20px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
    .win-msg { font-size: 14px; color: var(--text-soft); font-weight: 500; margin-bottom: 24px; line-height: 1.6; }

    /* ===== BUTTONS ===== */
    .btn {
      width: 100%;
      padding: 14px 20px;
      border-radius: var(--r-sm);
      border: none;
      font-family: 'Outfit', sans-serif;
      font-size: 15px; font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      margin-bottom: 8px;
    }

    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--accent); color: white; }
    .btn-ghost { background: var(--surface2); color: var(--text-soft); border: 1.5px solid var(--border); }

    /* ===== SCENARIO ===== */
    .scenario-wrap { display: flex; flex-direction: column; gap: 10px; }

    .scenario-header {
      background: var(--surface);
      border-radius: var(--r);
      padding: 20px;
      border: 1.5px solid var(--border);
    }

    .prog-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .prog-track { flex: 1; height: 5px; background: var(--surface2); border-radius: 999px; overflow: hidden; }
    .prog-fill { height: 100%; background: var(--accent); border-radius: 999px; transition: width 0.4s ease; }
    .prog-lbl { font-size: 12px; font-weight: 700; color: var(--text-xsoft); }

    .sc-tag {
      display: inline-block; font-size: 11px; font-weight: 700;
      letter-spacing: 0.8px; text-transform: uppercase;
      color: var(--text-xsoft); margin-bottom: 8px;
    }

    .sc-q { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.6; }

    .opt-btn {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--r-sm);
      padding: 14px 16px;
      text-align: left;
      width: 100%;
      font-family: 'Outfit', sans-serif;
      font-size: 14px; font-weight: 600;
      color: var(--text);
      cursor: pointer;
      display: flex; align-items: flex-start; gap: 10px;
      transition: all 0.14s;
      line-height: 1.5;
    }

    .opt-btn:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-light); }
    .opt-btn:active:not(:disabled) { transform: scale(0.98); }
    .opt-btn:disabled { cursor: default; }
    .opt-btn.correct { background: var(--green-light); border-color: rgba(22,163,74,0.35); color: #14532D; }
    .opt-btn.wrong { background: var(--rose-light); border-color: rgba(225,29,72,0.2); color: #9F1239; opacity: 0.75; }

    .opt-letter {
      width: 24px; height: 24px; border-radius: 6px;
      background: var(--surface2); color: var(--text-soft);
      font-size: 12px; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.14s;
    }

    .opt-btn.correct .opt-letter { background: #BBF7D0; color: #166534; }
    .opt-btn.wrong .opt-letter { background: #FECDD3; color: #9F1239; }

    /* ===== WORD PUZZLE ===== */
    .word-grid {
      display: flex; flex-direction: column; gap: 6px;
      margin-bottom: 16px;
    }

    .word-row { display: flex; gap: 6px; justify-content: center; }

    .word-cell {
      width: clamp(44px, 12vw, 56px);
      height: clamp(44px, 12vw, 56px);
      border-radius: 8px;
      border: 2px solid var(--border);
      background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      font-size: clamp(17px, 4vw, 20px);
      font-weight: 800;
      text-transform: uppercase;
      transition: all 0.12s;
    }

    .word-cell.filled { border-color: var(--text-soft); }
    .word-cell.correct { background: var(--green); border-color: var(--green); color: white; }
    .word-cell.present { background: var(--amber); border-color: var(--amber); color: white; }
    .word-cell.absent { background: #6B6560; border-color: #6B6560; color: white; }
    .word-cell.current-row { border-color: var(--accent); }

    .word-cell.pop {
      animation: cellPop 0.12s ease;
    }
    @keyframes cellPop { 0%{transform:scale(1)} 50%{transform:scale(1.08)} 100%{transform:scale(1)} }

    .word-cell.shake { animation: cellShake 0.35s ease; }
    @keyframes cellShake {
      0%,100%{transform:translateX(0)} 20%{transform:translateX(-4px)} 40%{transform:translateX(4px)} 60%{transform:translateX(-3px)} 80%{transform:translateX(3px)}
    }

    .word-cell.flip {
      animation: cellFlip 0.4s ease forwards;
    }
    @keyframes cellFlip {
      0%{transform:scaleY(1)} 50%{transform:scaleY(0)} 100%{transform:scaleY(1)}
    }

    .keyboard { display: flex; flex-direction: column; gap: 6px; }
    .kb-row { display: flex; gap: 5px; justify-content: center; }

    .kb-key {
      min-width: clamp(26px, 7vw, 36px);
      height: clamp(44px, 10vw, 52px);
      border-radius: 6px;
      border: none;
      background: var(--surface2);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: clamp(11px, 3vw, 14px);
      font-weight: 700;
      cursor: pointer;
      transition: all 0.12s;
      flex: 1;
      max-width: 44px;
    }

    .kb-key.wide { flex: 1.5; max-width: 64px; font-size: clamp(10px, 2.5vw, 12px); }
    .kb-key:active { transform: scale(0.93); }
    .kb-key.k-correct { background: var(--green); color: white; }
    .kb-key.k-present { background: var(--amber); color: white; }
    .kb-key.k-absent { background: #9E9891; color: white; }

    .word-msg {
      text-align: center; font-size: 14px; font-weight: 700;
      padding: 10px; border-radius: var(--r-sm);
      margin-bottom: 12px;
      animation: fadeSlide 0.2s ease;
    }

    .word-msg.good { background: var(--green-light); color: #14532D; }
    .word-msg.bad { background: var(--rose-light); color: #9F1239; }
    .word-msg.info { background: var(--amber-light); color: #78350F; }

    /* ===== TRIVIA ===== */
    .trivia-q {
      background: var(--surface);
      border-radius: var(--r);
      padding: 20px;
      border: 1.5px solid var(--border);
      margin-bottom: 10px;
    }

    .trivia-num { font-size: 11px; font-weight: 700; color: var(--text-xsoft); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 8px; }
    .trivia-text { font-size: 16px; font-weight: 600; color: var(--text); line-height: 1.6; }

    .trivia-opts { display: flex; flex-direction: column; gap: 8px; }

    .trivia-opt {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--r-sm);
      padding: 13px 16px;
      text-align: left;
      width: 100%;
      font-family: 'Outfit', sans-serif;
      font-size: 14px; font-weight: 600;
      color: var(--text);
      cursor: pointer;
      display: flex; align-items: center; gap: 10px;
      transition: all 0.14s;
    }

    .trivia-opt:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-light); }
    .trivia-opt:active:not(:disabled) { transform: scale(0.98); }
    .trivia-opt:disabled { cursor: default; }
    .trivia-opt.correct { background: var(--green-light); border-color: rgba(22,163,74,0.35); color: #14532D; }
    .trivia-opt.wrong { background: var(--rose-light); border-color: rgba(225,29,72,0.2); color: #9F1239; opacity: 0.7; }

    .trivia-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--border); flex-shrink: 0;
      transition: all 0.14s;
    }

    .trivia-opt.correct .trivia-dot { background: var(--green); }
    .trivia-opt.wrong .trivia-dot { background: var(--rose); }

    /* ===== COMPLETE ===== */
    .complete {
      background: var(--surface);
      border-radius: var(--r);
      padding: 32px 24px;
      text-align: center;
      border: 1.5px solid var(--border);
      animation: fadeSlide 0.35s ease;
    }

    .complete-icon { font-size: 52px; display: block; margin-bottom: 14px; }
    .complete-title { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
    .complete-score { font-size: 15px; color: var(--text-soft); font-weight: 500; margin-bottom: 28px; line-height: 1.6; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<!-- GREETING -->
<div id="greeting">
  <div class="g-sub">Good morning</div>
  <div class="g-name">Hi Debbie 👋</div>
  <div class="g-tagline">A little something to keep that sharp mind going.</div>
  <span class="g-heart">❤️</span>
  <div class="g-from">— from your grandson</div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <div id="screen-home">
    <div class="home-top">
      <div class="home-greeting">Brain Lab</div>
      <div class="home-title">Pick a game,<br>Debbie.</div>
      <div class="home-sub">All brain. No filler.</div>
    </div>
    <div class="streak-row">
      <span class="streak-badge">🔥 <span id="streak">0</span> day streak</span>
    </div>

    <div class="section-label">Games</div>
    <div class="game-list">
      <button class="game-tile" onclick="go('memory')">
        <div class="game-tile-icon" style="background:#EBF1FD;">🃏</div>
        <div class="game-tile-body">
          <div class="game-tile-name">Memory Match</div>
          <div class="game-tile-desc">Find the pairs. Beat your best.</div>
        </div>
        <div class="game-tile-arrow">›</div>
      </button>
      <button class="game-tile" onclick="go('word')">
        <div class="game-tile-icon" style="background:#DCFCE7;">🔤</div>
        <div class="game-tile-body">
          <div class="game-tile-name">Word Puzzle</div>
          <div class="game-tile-desc">Guess the 5-letter word in 6 tries.</div>
        </div>
        <div class="game-tile-arrow">›</div>
      </button>
      <button class="game-tile" onclick="go('trivia')">
        <div class="game-tile-icon" style="background:#EDE9FE;">🧩</div>
        <div class="game-tile-body">
          <div class="game-tile-name">Trivia Mix</div>
          <div class="game-tile-desc">History, science, nature — mix of everything good.</div>
        </div>
        <div class="game-tile-arrow">›</div>
      </button>
      <button class="game-tile" onclick="go('decisions')">
        <div class="game-tile-icon" style="background:#FEF3C7;">💼</div>
        <div class="game-tile-body">
          <div class="game-tile-name">Decision Maker</div>
          <div class="game-tile-desc">Classic business dilemmas. What's the right call?</div>
        </div>
        <div class="game-tile-arrow">›</div>
      </button>
    </div>
  </div>

  <!-- MEMORY -->
  <div id="screen-memory" class="hidden">
    <div class="nav">
      <button class="nav-back" onclick="go('home')">‹ Back</button>
      <div class="nav-title">Memory Match</div>
      <span class="streak-badge">🔥 <span id="memStreakBadge">0</span></span>
    </div>
    <div class="mem-bar">
      <div class="mem-stat"><div class="mem-stat-val" id="memMoves">0</div><div class="mem-stat-lbl">Moves</div></div>
      <div class="mem-stat"><div class="mem-stat-val" id="memPairs">0/8</div><div class="mem-stat-lbl">Pairs</div></div>
      <div class="mem-stat"><div class="mem-stat-val" id="memBestDisp">—</div><div class="mem-stat-lbl">Best</div></div>
    </div>
    <div id="memGrid"></div>
    <div id="memWin" class="win-panel hidden">
      <span class="win-icon">🏆</span>
      <div class="win-title" id="winTitle">All pairs found!</div>
      <div class="win-msg" id="winMsg"></div>
      <button class="btn btn-primary" onclick="initMemory()">Play again</button>
      <button class="btn btn-ghost" onclick="go('home')">← Home</button>
    </div>
  </div>

  <!-- WORD PUZZLE -->
  <div id="screen-word" class="hidden">
    <div class="nav">
      <button class="nav-back" onclick="go('home')">‹ Back</button>
      <div class="nav-title">Word Puzzle</div>
      <span class="streak-badge">🔥 <span id="wordStreakBadge">0</span></span>
    </div>
    <div id="wordMsg" class="word-msg hidden"></div>
    <div class="word-grid" id="wordGrid"></div>
    <div class="keyboard" id="keyboard"></div>
    <div id="wordResult" class="hidden" style="margin-top:20px;">
      <div class="win-panel">
        <span class="win-icon" id="wordResultIcon">🎉</span>
        <div class="win-title" id="wordResultTitle"></div>
        <div class="win-msg" id="wordResultMsg"></div>
        <button class="btn btn-primary" onclick="initWord()">New word</button>
        <button class="btn btn-ghost" onclick="go('home')">← Home</button>
      </div>
    </div>
  </div>

  <!-- TRIVIA -->
  <div id="screen-trivia" class="hidden">
    <div class="nav">
      <button class="nav-back" onclick="go('home')">‹ Back</button>
      <div class="nav-title">Trivia Mix</div>
      <span class="streak-badge">🔥 <span id="triviaStreakBadge">0</span></span>
    </div>
    <div id="triviaContent"></div>
  </div>

  <!-- DECISIONS -->
  <div id="screen-decisions" class="hidden">
    <div class="nav">
      <button class="nav-back" onclick="go('home')">‹ Back</button>
      <div class="nav-title">Decision Maker</div>
      <span class="streak-badge">🔥 <span id="decStreakBadge">0</span></span>
    </div>
    <div id="decContent"></div>
  </div>
</div>

<script>
// ================================================================
// MEMORY
// ================================================================
const EMOJIS = ['🦋','🌿','⭐','🎵','🌊','🏔️','🌺','🍎'];
let mCards=[], mFlipped=[], mMatched=[], mMoves=0, mCount=0;

function initMemory() {
  const pairs = [...EMOJIS,...EMOJIS].sort(()=>Math.random()-0.5);
  mCards=pairs; mFlipped=[]; mMatched=[]; mMoves=0; mCount=0;
  document.getElementById('memWin').classList.add('hidden');
  document.getElementById('memGrid').classList.remove('hidden');
  renderMemStats();

  const g = document.getElementById('memGrid');
  g.innerHTML='';
  pairs.forEach((e,i)=>{
    const d=document.createElement('div');
    d.className='mc'; d.dataset.v=e; d.dataset.i=i;
    d.innerHTML=`<div class="mc-f">·</div><div class="mc-b">${e}</div>`;
    d.addEventListener('click',onMemClick);
    g.appendChild(d);
  });
}

function onMemClick(ev) {
  const c=ev.currentTarget;
  if(mFlipped.length===2||c.classList.contains('flipped')||c.classList.contains('matched')) return;
  c.classList.add('flipped'); mFlipped.push(c);
  if(mFlipped.length===2){
    mMoves++; renderMemStats();
    if(mFlipped[0].dataset.v===mFlipped[1].dataset.v){
      mFlipped.forEach(x=>{x.classList.add('matched');x.removeEventListener('click',onMemClick);});
      mMatched.push(...mFlipped); mCount++; mFlipped=[];
      renderMemStats();
      if(mCount===8){
        const best=parseInt(localStorage.getItem('memBest')||'9999');
        if(mMoves<best) localStorage.setItem('memBest',mMoves);
        renderMemStats(); updateStreak();
        setTimeout(()=>{
          document.getElementById('memGrid').classList.add('hidden');
          document.getElementById('winTitle').textContent = mMoves<=14?'Flawless.':'All pairs found!';
          document.getElementById('winMsg').textContent = mMoves<=14
            ?`${mMoves} moves — that's exceptional.`
            :mMoves<=20?`${mMoves} moves. Sharp.`:`${mMoves} moves — got there!`;
          document.getElementById('memWin').classList.remove('hidden');
          confetti();
        },400);
      }
    } else {
      setTimeout(()=>{mFlipped.forEach(x=>x.classList.remove('flipped'));mFlipped=[];},900);
    }
  }
}

function renderMemStats(){
  document.getElementById('memMoves').textContent=mMoves;
  document.getElementById('memPairs').textContent=mCount+'/8';
  const b=localStorage.getItem('memBest');
  document.getElementById('memBestDisp').textContent=b||'—';
  document.getElementById('memStreakBadge').textContent=localStorage.getItem('dbStreak')||'0';
}

// ================================================================
// WORD PUZZLE (Wordle-style)
// ================================================================
const WORDS = [
  'CRANE','PLANT','SHARP','BRISK','CHART','FLAME','BRAVE','CLAMP',
  'DRAFT','FLINT','GRASP','HINGE','LATCH','MARCH','NOTCH','PIVOT',
  'QUIRK','RIDGE','SCOUT','THRIVE','SWIFT','TORCH','TWIST','VAULT',
  'WRIST','YIELD','BLOOM','CHEST','DRIVE','FETCH','GLARE','HATCH',
  'JUDGE','KNACK','LUSTY','MEANT','NOBLE','OLIVE','PLUMB','QUILL',
  'RIVET','SLOPE','TROUT','ULCER','VISTA','WALTZ','YEAST','ZONAL',
  'CABIN','DANCE','EAGLE','FABLE','GLOBE','HABIT','INFER','JOUST',
  'KARMA','LEMON','MAPLE','NERVE','ORBIT','PROBE','QUEEN','REALM',
  'STAGE','TIGER','UNITE','VIOLA','WAGER','YOUTH','ZEBRA','BLAZE',
  'CRISP','DELTA','ELBOW','FINCH','GROVE','HOARD','INSET','JELLY',
  'KNEEL','LLAMA','MERGE','NYMPH','ONSET','PIXEL','QUEST','ROUSE',
  'SHAWL','TRYST','USHER','VENOM','WHEAT','XYLEM','YEARN','ZILCH'
];

let wTarget='', wGuesses=[], wCurrent='', wDone=false;
const ROWS=6, COLS=5;

function initWord() {
  wTarget = WORDS[Math.floor(Math.random()*WORDS.length)];
  wGuesses=[]; wCurrent=''; wDone=false;
  document.getElementById('wordResult').classList.add('hidden');
  document.getElementById('wordMsg').classList.add('hidden');
  buildWordGrid();
  buildKeyboard();
  document.getElementById('wordStreakBadge').textContent=localStorage.getItem('dbStreak')||'0';
}

function buildWordGrid(){
  const g=document.getElementById('wordGrid'); g.innerHTML='';
  for(let r=0;r<ROWS;r++){
    const row=document.createElement('div'); row.className='word-row';
    for(let c=0;c<COLS;c++){
      const cell=document.createElement('div');
      cell.className='word-cell'; cell.id=`wc-${r}-${c}`;
      row.appendChild(cell);
    } g.appendChild(row);
  }
}

function buildKeyboard(){
  const rows=[['Q','W','E','R','T','Y','U','I','O','P'],['A','S','D','F','G','H','J','K','L'],['ENTER','Z','X','C','V','B','N','M','⌫']];
  const kb=document.getElementById('keyboard'); kb.innerHTML='';
  rows.forEach(row=>{
    const div=document.createElement('div'); div.className='kb-row';
    row.forEach(k=>{
      const btn=document.createElement('button');
      btn.className='kb-key'+(k.length>1?' wide':'');
      btn.textContent=k; btn.dataset.k=k;
      btn.addEventListener('click',()=>onKey(k));
      div.appendChild(btn);
    }); kb.appendChild(div);
  });
}

function onKey(k){
  if(wDone) return;
  if(k==='⌫'){
    wCurrent=wCurrent.slice(0,-1); updateCurrentRow(); return;
  }
  if(k==='ENTER'){
    if(wCurrent.length<COLS){ showWordMsg('Not enough letters','bad'); return; }
    submitGuess(); return;
  }
  if(wCurrent.length<COLS) { wCurrent+=k; updateCurrentRow(); }
}

document.addEventListener('keydown',e=>{
  if(document.getElementById('screen-word').classList.contains('hidden')) return;
  if(e.key==='Enter') onKey('ENTER');
  else if(e.key==='Backspace') onKey('⌫');
  else if(/^[a-zA-Z]$/.test(e.key)) onKey(e.key.toUpperCase());
});

function updateCurrentRow(){
  const r=wGuesses.length;
  for(let c=0;c<COLS;c++){
    const cell=document.getElementById(`wc-${r}-${c}`);
    const ch=wCurrent[c]||'';
    cell.textContent=ch;
    cell.className='word-cell'+(ch?' filled current-row':'');
    if(ch) { cell.classList.add('pop'); setTimeout(()=>cell.classList.remove('pop'),120); }
  }
}

function submitGuess(){
  const guess=wCurrent;
  const result=scoreGuess(guess, wTarget);
  const r=wGuesses.length;
  document.getElementById('wordMsg').classList.add('hidden');

  result.forEach((res,c)=>{
    const cell=document.getElementById(`wc-${r}-${c}`);
    cell.className='word-cell filled';
    setTimeout(()=>{
      cell.classList.add('flip');
      setTimeout(()=>{ cell.classList.remove('flip'); cell.classList.add(res); },200);
    }, c*80);
  });

  setTimeout(()=>updateKbColors(guess,result), COLS*80+250);

  wGuesses.push(guess); wCurrent='';

  if(guess===wTarget){
    wDone=true; updateStreak(); confetti();
    setTimeout(()=>{
      const msgs=['Perfect!','Got it!','Nice work!','Sharp!','Correct!','You got it!'];
      document.getElementById('wordResultIcon').textContent='🎉';
      document.getElementById('wordResultTitle').textContent=msgs[Math.min(wGuesses.length-1,5)];
      document.getElementById('wordResultMsg').textContent=`"${wTarget}" — solved in ${wGuesses.length} ${wGuesses.length===1?'try':'tries'}.`;
      document.getElementById('wordResult').classList.remove('hidden');
    }, COLS*80+600);
    return;
  }

  if(wGuesses.length===ROWS){
    wDone=true;
    setTimeout(()=>{
      document.getElementById('wordResultIcon').textContent='😅';
      document.getElementById('wordResultTitle').textContent='Almost!';
      document.getElementById('wordResultMsg').textContent=`The word was "${wTarget}". Give it another go!`;
      document.getElementById('wordResult').classList.remove('hidden');
    }, COLS*80+500);
    return;
  }

  updateCurrentRow();
}

function scoreGuess(guess, target){
  const res=Array(COLS).fill('absent');
  const tArr=[...target], used=Array(COLS).fill(false);
  // correct pass
  for(let i=0;i<COLS;i++) if(guess[i]===tArr[i]){ res[i]='correct'; used[i]=true; }
  // present pass
  for(let i=0;i<COLS;i++){
    if(res[i]==='correct') continue;
    for(let j=0;j<COLS;j++){
      if(!used[j]&&res[j]!=='correct'&&guess[i]===tArr[j]){ res[i]='present'; used[j]=true; break; }
    }
  }
  return res;
}

function updateKbColors(guess, result){
  const priority={correct:3,present:2,absent:1};
  result.forEach((res,i)=>{
    const k=guess[i];
    document.querySelectorAll('.kb-key').forEach(btn=>{
      if(btn.dataset.k===k){
        const cur=btn.classList.contains('k-correct')?'correct':btn.classList.contains('k-present')?'present':btn.classList.contains('k-absent')?'absent':null;
        if(!cur||priority[res]>priority[cur]){
          btn.className=`kb-key${k.length>1?' wide':''} k-${res}`;
        }
      }
    });
  });
}

function showWordMsg(msg, type){
  const el=document.getElementById('wordMsg');
  el.textContent=msg; el.className=`word-msg ${type}`;
  el.classList.remove('hidden');
  setTimeout(()=>el.classList.add('hidden'),1600);
  // shake current row
  for(let c=0;c<COLS;c++){
    const cell=document.getElementById(`wc-${wGuesses.length}-${c}`);
    cell.classList.add('shake');
    setTimeout(()=>cell.classList.remove('shake'),350);
  }
}

let dIdx=0, dDone=false;

function initDecisions(){

  window._decSet=shuffled.slice(0,5);

function renderDecision(set){
  window._decSet=window._decSet||set;

function onDecision(choice){

function updateStreak(){
  let s=parseInt(localStorage.getItem('dbStreak')||'0');
  const last=localStorage.getItem('dbLastDate'), today=new Date().toDateString();
  if(last!==today){ s++; localStorage.setItem('dbStreak',s); localStorage.setItem('dbLastDate',today); }
  document.getElementById('streak').textContent=s;
}

function go(screen){
  ['home','memory','word','trivia','decisions'].forEach(s=>{
    document.getElementById('screen-'+s).classList.add('hidden');
  });
  document.getElementById('screen-'+screen).classList.remove('hidden');
  if(screen==='memory') initMemory();
  if(screen==='word') initWord();
  if(screen==='trivia') initTrivia();
  if(screen==='decisions') initDecisions();
  if(screen==='home') updateStreak();
  window.scrollTo(0,0);
}

function confetti(){
  const c=['#3B82F6','#16A34A','#D97706','#7C3AED','#E11D48','#14B8A6'];
  for(let i=0;i<30;i++){
    const el=document.createElement('div');
    el.style.cssText=`position:fixed;left:${Math.random()*100}vw;top:-12px;width:${5+Math.random()*6}px;height:${5+Math.random()*6}px;border-radius:${Math.random()>.5?'50%':'2px'};background:${c[Math.floor(Math.random()*c.length)]};pointer-events:none;z-index:9999;animation:confettiFall ${1.2+Math.random()*1.8}s linear ${Math.random()*0.5}s forwards`;
    document.body.appendChild(el);
    el.addEventListener('animationend',()=>el.remove());
  }
}

const style=document.createElement('style');
style.textContent=`@keyframes confettiFall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(540deg);opacity:0}}`;
document.head.appendChild(style);
