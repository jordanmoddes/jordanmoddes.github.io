<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DocTrack Terminal</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet"/>

  <!--
  ============================================================
    IP OF JORDAN MODDES
    DocTrack Terminal v2.1
    Designed & Built by Jordan Moddes | jordanmoddes.com
    For: Cerilliant / MilliporeSigma — Internal Use Only

    SCANNER-ONLY INTERFACE — no mouse required
    Scan flow: Badge → Folder ID → WIP/DROP → Department

    Failsafes:
      • Press B at any step  → opens manual entry text box
      • 15 seconds of no input → resets to Step 1, discards progress

    Manual entries are flagged in the log as entry_method: 'MANUAL'

    TO SWITCH TO LIVE BACKEND:
    1. Set DEMO_MODE = false
    2. Set API_BASE_URL to your internal server IP
  ============================================================
  -->

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0e13;
      color: #d0e4f0;
      font-family: 'Share Tech Mono', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* Step label above prompt */
    #step-label {
      font-size: 1rem;
      color: #4a6070;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    /* Big instruction text */
    #prompt {
      font-size: 2.8rem;
      font-weight: bold;
      color: #00c8ff;
      text-align: center;
      margin-bottom: 32px;
      line-height: 1.2;
    }

    /* Shows what was just scanned */
    #scanned-value {
      font-size: 1.5rem;
      color: #00ff9d;
      min-height: 2rem;
      text-align: center;
      margin-bottom: 32px;
      letter-spacing: 2px;
    }

    /* Four progress dots */
    #progress {
      display: flex;
      gap: 16px;
      margin-bottom: 32px;
    }
    .dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #1e2d3d;
      border: 2px solid #1e2d3d;
      transition: all 0.2s;
    }
    .dot.done   { background: #00ff9d; border-color: #00ff9d; }
    .dot.active { background: #00c8ff; border-color: #00c8ff; }

    /* Result message */
    #status {
      font-size: 1.1rem;
      text-align: center;
      min-height: 2rem;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }
    #status.success { color: #00ff9d; }
    #status.error   { color: #ff6b35; }
    #status.warn    { color: #ffc857; }

    /* Timeout countdown indicator */
    #timeout-bar-wrap {
      width: 300px;
      height: 3px;
      background: #1e2d3d;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    #timeout-bar {
      height: 100%;
      background: #ff6b35;
      width: 100%;
      transition: width 1s linear;
    }

    /* Help hint at the bottom */
    #hint {
      font-size: 0.75rem;
      color: #4a6070;
      letter-spacing: 2px;
      text-align: center;
    }
    #hint .key {
      display: inline-block;
      border: 1px solid #4a6070;
      border-radius: 3px;
      padding: 1px 6px;
      margin: 0 3px;
      color: #d0e4f0;
    }

    /* Hidden input — always focused */
    #scanner-input {
      position: fixed;
      top: -999px;
      left: -999px;
      opacity: 0;
      width: 1px;
      height: 1px;
    }

    /* Manual entry modal — full screen overlay */
    #manual-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10, 14, 19, 0.97);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    #manual-overlay.active { display: flex; }

    #manual-title {
      font-size: 1rem;
      color: #ffc857;
      letter-spacing: 3px;
      margin-bottom: 12px;
      text-transform: uppercase;
    }
    #manual-prompt {
      font-size: 2rem;
      color: #ffc857;
      margin-bottom: 28px;
      text-align: center;
    }
    #manual-field {
      width: 90%;
      max-width: 500px;
      background: #0a0e13;
      border: 2px solid #ffc857;
      border-radius: 4px;
      color: #ffc857;
      font-family: 'Share Tech Mono', monospace;
      font-size: 1.8rem;
      padding: 16px 20px;
      text-align: center;
      letter-spacing: 2px;
      outline: none;
    }
    #manual-instructions {
      margin-top: 20px;
      color: #4a6070;
      font-size: 0.9rem;
      letter-spacing: 2px;
    }
    #manual-instructions .key {
      display: inline-block;
      border: 1px solid #4a6070;
      border-radius: 3px;
      padding: 1px 6px;
      margin: 0 3px;
      color: #d0e4f0;
    }

    footer {
      position: fixed;
      bottom: 12px;
      font-size: 0.65rem;
      color: #1e2d3d;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

<!--
  IP OF JORDAN MODDES — jordanmoddes.com
  DocTrack Terminal — scanner-first with manual fallback
-->

<!-- Hidden input captures scanner or keyboard input -->
<input id="scanner-input" type="text" autocomplete="off" autofocus />

<!-- Main scanner screen -->
<div id="step-label">Step 1 of 4</div>
<div id="prompt">SCAN BADGE</div>
<div id="scanned-value">&nbsp;</div>

<div id="progress">
  <div class="dot active" id="dot-1"></div>
  <div class="dot"        id="dot-2"></div>
  <div class="dot"        id="dot-3"></div>
  <div class="dot"        id="dot-4"></div>
</div>

<div id="status">&nbsp;</div>

<div id="timeout-bar-wrap" style="visibility:hidden;">
  <div id="timeout-bar"></div>
</div>

<div id="hint">SCANNER NOT WORKING? PRESS <span class="key">B</span> FOR MANUAL ENTRY</div>

<!-- Manual entry overlay — shows when B is pressed -->
<div id="manual-overlay">
  <div id="manual-title">⚠ Manual Entry Mode</div>
  <div id="manual-prompt">Type value for current step</div>
  <input id="manual-field" type="text" autocomplete="off" />
  <div id="manual-instructions">
    <span class="key">ENTER</span> SUBMIT &nbsp;&nbsp; <span class="key">ESC</span> CANCEL
  </div>
</div>

<footer>IP OF JORDAN MODDES &nbsp;|&nbsp; jordanmoddes.com &nbsp;|&nbsp; INTERNAL USE ONLY</footer>


<script>
  // ============================================================
  //  CONFIG
  // ============================================================
  const DEMO_MODE     = false;
  const API_BASE_URL = 'https://doctrack-backend-qga8.onrender.com';
  const TIMEOUT_SECS  = 15;     // seconds of no activity before reset


  // ============================================================
  //  SCAN STEPS
  // ============================================================
  const STEPS = [
    { label: 'Step 1 of 4', prompt: 'SCAN BADGE',      field: 'badge'      },
    { label: 'Step 2 of 4', prompt: 'SCAN FOLDER ID',  field: 'docID'      },
    { label: 'Step 3 of 4', prompt: 'SCAN WIP / DROP', field: 'eventType'  },
    { label: 'Step 4 of 4', prompt: 'SCAN DEPARTMENT', field: 'department' },
  ];


  // ============================================================
  //  BARCODE MAPS — update these when real barcodes are printed
  // ============================================================
  const EVENT_BARCODES = {
    'EVT-WIP':  'WIP',
    'EVT-DROP': 'DROP-OFF',
  };

  const DEPT_BARCODES = {
    'DEPT-PLAN': 'Planning',
    'DEPT-QC':   'QC Review',
    'DEPT-LAB':  'Lab',
    'DEPT-WH':   'Warehouse',
    'DEPT-STOR': 'Storage',
    'DEPT-SHIP': 'Shipping / Receiving',
  };


  // ============================================================
  //  STATE
  // ============================================================
  let currentStep   = 0;
  let scan          = {};        // { badge, docID, eventType, department }
  let entryMethod   = 'SCAN';    // 'SCAN' or 'MANUAL' — tracks how each event was entered
  let manualMode    = false;     // true when manual entry overlay is open
  let timeoutHandle = null;      // timer for 15-sec auto-reset
  let countdownHandle = null;    // timer for visual countdown bar


  // ============================================================
  //  UI HELPERS
  // ============================================================
  function setPrompt(stepIndex) {
    document.getElementById('step-label').textContent  = STEPS[stepIndex].label;
    document.getElementById('prompt').textContent      = STEPS[stepIndex].prompt;
    document.getElementById('scanned-value').innerHTML = '&nbsp;';
    document.getElementById('status').innerHTML        = '&nbsp;';
    document.getElementById('status').className        = '';

    for (let i = 0; i < 4; i++) {
      const dot = document.getElementById(`dot-${i + 1}`);
      if (i < stepIndex)        dot.className = 'dot done';
      else if (i === stepIndex) dot.className = 'dot active';
      else                      dot.className = 'dot';
    }
  }

  function showStatus(msg, type) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = type || '';
  }

  function flashValue(val) {
    document.getElementById('scanned-value').textContent = val;
  }


  // ============================================================
  //  TIMEOUT — resets to Step 1 if no input for 15 seconds
  //  Does NOT run on Step 1 (nothing to lose yet)
  //  Does NOT run during a submit
  // ============================================================
  function startTimeout() {
    clearTimeout(timeoutHandle);
    clearInterval(countdownHandle);

    // Only run timeout if we're past step 1 (data is actually at risk)
    if (currentStep === 0) {
      document.getElementById('timeout-bar-wrap').style.visibility = 'hidden';
      return;
    }

    // Show the countdown bar
    const bar = document.getElementById('timeout-bar');
    const wrap = document.getElementById('timeout-bar-wrap');
    wrap.style.visibility = 'visible';
    bar.style.transition = 'none';
    bar.style.width = '100%';

    // Reset transition after a tick so it animates down
    setTimeout(() => {
      bar.style.transition = `width ${TIMEOUT_SECS}s linear`;
      bar.style.width = '0%';
    }, 10);

    // The actual timeout — resets after TIMEOUT_SECS
    timeoutHandle = setTimeout(() => {
      showStatus('⏱ TIMED OUT — ENTRY DISCARDED', 'warn');
      hardReset();
      setTimeout(() => setPrompt(0), 100);
    }, TIMEOUT_SECS * 1000);
  }

  function stopTimeout() {
    clearTimeout(timeoutHandle);
    clearInterval(countdownHandle);
    document.getElementById('timeout-bar-wrap').style.visibility = 'hidden';
  }


  // ============================================================
  //  RESET FUNCTIONS
  //  softReset — clears data and returns to step 1 after a delay
  //  hardReset — clears data immediately, no delay
  // ============================================================
  function softReset() {
    setTimeout(() => {
      hardReset();
      setPrompt(0);
    }, 2000);
  }

  function hardReset() {
    scan = {};
    currentStep = 0;
    entryMethod = 'SCAN';
    stopTimeout();
  }


  // ============================================================
  //  SUBMIT — sends completed scan event to backend
  // ============================================================
  async function submitEvent() {
    stopTimeout();

    const payload = {
      timestamp:     new Date().toISOString(),
      badge:         scan.badge,
      docID:         scan.docID,
      eventType:     scan.eventType,
      department:    scan.department,
      entry_method:  entryMethod,   // 'SCAN' or 'MANUAL' — audit trail
    };

    if (DEMO_MODE) {
      console.log('SCAN EVENT LOGGED:', payload);
      const methodTag = entryMethod === 'MANUAL' ? ' [MANUAL]' : '';
      showStatus(`✓ LOGGED${methodTag} — ${scan.eventType} | ${scan.docID} | ${scan.department}`, 'success');
      softReset();
      return;
    }

    /*
    ============================================================
      LIVE BACKEND — uncomment when IT server is ready
    ============================================================
    try {
      await fetch(`${API_BASE_URL}/scan-log`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(payload),
      });
      const methodTag = entryMethod === 'MANUAL' ? ' [MANUAL]' : '';
      showStatus(`✓ LOGGED${methodTag} — ${scan.eventType} | ${scan.docID} | ${scan.department}`, 'success');
    } catch (err) {
      showStatus('⚠ NETWORK ERROR — TRY AGAIN', 'error');
    }
    softReset();
    */
  }


  // ============================================================
  //  PROCESS VALUE — shared logic for both scanner and manual
  //  isManual: true if came from manual entry overlay
  // ============================================================
  function processValue(value, isManual) {
    value = (value || '').trim();
    if (!value) return;

    // Flag this whole transaction as manual if ANY step used manual
    if (isManual) entryMethod = 'MANUAL';

    const field = STEPS[currentStep].field;

    // STEP 1: Badge
    if (field === 'badge') {
      scan.badge = value;
      flashValue(value + (isManual ? ' (manual)' : ''));
      currentStep++;
      setPrompt(currentStep);
      startTimeout();
      return;
    }

    // STEP 2: Folder ID
    if (field === 'docID') {
      scan.docID = value;
      flashValue(value + (isManual ? ' (manual)' : ''));
      currentStep++;
      setPrompt(currentStep);
      startTimeout();
      return;
    }

    // STEP 3: WIP or DROP
    if (field === 'eventType') {
      // Accept both barcode values (EVT-WIP) and plain values (WIP, DROP, DROP-OFF)
      // This lets manual entry work even if they just type WIP
      let mapped = EVENT_BARCODES[value.toUpperCase()];
      if (!mapped) {
        const upper = value.toUpperCase();
        if (upper === 'WIP')                      mapped = 'WIP';
        else if (upper === 'DROP' || upper === 'DROP-OFF') mapped = 'DROP-OFF';
      }
      if (!mapped) {
        showStatus('⚠ UNKNOWN — SCAN WIP OR DROP LABEL', 'error');
        return;
      }
      scan.eventType = mapped;
      flashValue(mapped + (isManual ? ' (manual)' : ''));
      currentStep++;
      setPrompt(currentStep);
      startTimeout();
      return;
    }

    // STEP 4: Department — auto-submit after this
    if (field === 'department') {
      // Accept both barcode values (DEPT-QC) and plain department names
      let mapped = DEPT_BARCODES[value.toUpperCase()];
      if (!mapped) {
        // Check if they typed the plain department name
        for (const [code, name] of Object.entries(DEPT_BARCODES)) {
          if (name.toUpperCase() === value.toUpperCase()) {
            mapped = name;
            break;
          }
        }
      }
      if (!mapped) {
        showStatus('⚠ UNKNOWN — SCAN DEPARTMENT LABEL', 'error');
        return;
      }
      scan.department = mapped;
      flashValue(mapped + (isManual ? ' (manual)' : ''));

      // Mark all dots done
      for (let i = 0; i < 4; i++) {
        document.getElementById(`dot-${i + 1}`).className = 'dot done';
      }
      document.getElementById('prompt').textContent = 'SUBMITTING...';

      submitEvent();
      return;
    }
  }


  // ============================================================
  //  MANUAL ENTRY OVERLAY
  //  Opens when B is pressed. Shows text field for current step.
  // ============================================================
  function openManualEntry() {
    manualMode = true;
    const overlay = document.getElementById('manual-overlay');
    const field   = document.getElementById('manual-field');
    const prompt  = document.getElementById('manual-prompt');

    // Match prompt to current step
    const stepPrompts = {
      0: 'Enter badge number',
      1: 'Enter folder ID',
      2: 'Enter WIP or DROP',
      3: 'Enter department (e.g. Lab, QC Review)',
    };
    prompt.textContent = stepPrompts[currentStep];

    overlay.classList.add('active');
    field.value = '';
    field.focus();

    // Restart timeout — user interaction
    startTimeout();
  }

  function closeManualEntry() {
    manualMode = false;
    document.getElementById('manual-overlay').classList.remove('active');
    document.getElementById('scanner-input').focus();
  }

  // Manual field listeners
  const manualField = document.getElementById('manual-field');

  manualField.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      const val = manualField.value;
      closeManualEntry();
      processValue(val, true);
    } else if (e.key === 'Escape') {
      e.preventDefault();
      closeManualEntry();
      startTimeout();
    }
    // Any keystroke restarts the timeout
    startTimeout();
  });


  // ============================================================
  //  SCANNER INPUT HANDLER
  //  USB scanners type chars then hit Enter.
  //  Also handles the B key to open manual entry.
  // ============================================================
  const input = document.getElementById('scanner-input');
  let buffer = '';

  input.addEventListener('keydown', (e) => {
    // Don't run scanner logic when manual overlay is open
    if (manualMode) return;

    // Restart the timeout on any key activity
    startTimeout();

    if (e.key === 'Enter') {
      processValue(buffer, false);
      buffer = '';
      input.value = '';
      return;
    }

    // B key (when buffer is empty) opens manual entry
    // The "empty buffer" check prevents B mid-scan from triggering manual
    if ((e.key === 'b' || e.key === 'B') && buffer === '') {
      e.preventDefault();
      openManualEntry();
      return;
    }

    // Build buffer from printable keys
    if (e.key.length === 1) {
      buffer += e.key;
    }
  });


  // ============================================================
  //  FOCUS MANAGEMENT
  //  Keep the appropriate input focused at all times
  // ============================================================
  function refocus() {
    if (manualMode) {
      document.getElementById('manual-field').focus();
    } else {
      input.focus();
    }
  }

  document.addEventListener('click',    refocus);
  document.addEventListener('focusout', () => setTimeout(refocus, 50));
  window.addEventListener('load',       refocus);


  // ============================================================
  //  INIT
  // ============================================================
  setPrompt(0);
</script>

</body>
</html>
