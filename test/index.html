<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DocTrack Terminal</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet"/>

  <!--
  ============================================================
    IP OF JORDAN MODDES
    DocTrack Terminal v2.2 — Test Build
    Designed & Built by Jordan Moddes | jordanmoddes.com
    For: Cerilliant / MilliporeSigma — Internal Use Only

    TEST MODE BUTTONS added for debugging without a scanner:
      • Step 1: prefill button → 257001
      • Step 2: TEST button → "test folder"
      • Step 3: normal WIP/DROP scan flow (WIP auto-submits)
      • Step 4: TEST button → "test department"

    Failsafes still active:
      • Press B at any step → manual entry text box
      • 15 seconds of no input → auto-reset
  ============================================================
  -->

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0e13;
      color: #d0e4f0;
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    #step-label {
      font-size: 1rem;
      color: #4a6070;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    #prompt {
      font-size: 2.8rem;
      font-weight: bold;
      color: #00c8ff;
      text-align: center;
      margin-bottom: 32px;
      line-height: 1.2;
    }

    #scanned-value {
      font-size: 1.5rem;
      color: #00ff9d;
      min-height: 2rem;
      text-align: center;
      margin-bottom: 32px;
      letter-spacing: 2px;
    }

    #progress {
      display: flex;
      gap: 16px;
      margin-bottom: 32px;
    }
    .dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #1e2d3d;
      border: 2px solid #1e2d3d;
      transition: all 0.2s;
    }
    .dot.done   { background: #00ff9d; border-color: #00ff9d; }
    .dot.active { background: #00c8ff; border-color: #00c8ff; }

    #status {
      font-size: 1.1rem;
      text-align: center;
      min-height: 2rem;
      letter-spacing: 1px;
      margin-bottom: 20px;
    }
    #status.success { color: #00ff9d; }
    #status.error   { color: #ff6b35; }
    #status.warn    { color: #ffc857; }

    /* Test button area */
    #test-buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .test-btn {
      background: #1e2d3d;
      border: 2px solid #ffc857;
      color: #ffc857;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 2px;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
      text-transform: uppercase;
    }
    .test-btn:hover {
      background: #ffc857;
      color: #0a0e13;
    }

    /* Timeout bar */
    #timeout-bar-wrap {
      width: 300px;
      height: 3px;
      background: #1e2d3d;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    #timeout-bar {
      height: 100%;
      background: #ff6b35;
      width: 100%;
      transition: width 1s linear;
    }

    #hint {
      font-size: 0.75rem;
      color: #4a6070;
      letter-spacing: 2px;
      text-align: center;
      margin-top: 10px;
    }
    #hint .key {
      display: inline-block;
      border: 1px solid #4a6070;
      border-radius: 3px;
      padding: 1px 6px;
      margin: 0 3px;
      color: #d0e4f0;
    }

    /* Hidden scanner input */
    #scanner-input {
      position: fixed;
      top: -999px;
      left: -999px;
      opacity: 0;
      width: 1px;
      height: 1px;
    }

    /* Manual entry overlay */
    #manual-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10, 14, 19, 0.97);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    #manual-overlay.active { display: flex; }

    #manual-title {
      font-size: 1rem;
      color: #ffc857;
      letter-spacing: 3px;
      margin-bottom: 12px;
      text-transform: uppercase;
    }
    #manual-prompt {
      font-size: 2rem;
      color: #ffc857;
      margin-bottom: 28px;
      text-align: center;
    }
    #manual-field {
      width: 90%;
      max-width: 500px;
      background: #0a0e13;
      border: 2px solid #ffc857;
      border-radius: 4px;
      color: #ffc857;
      font-family: 'Share Tech Mono', monospace;
      font-size: 1.8rem;
      padding: 16px 20px;
      text-align: center;
      letter-spacing: 2px;
      outline: none;
    }
    #manual-instructions {
      margin-top: 20px;
      color: #4a6070;
      font-size: 0.9rem;
      letter-spacing: 2px;
    }
    #manual-instructions .key {
      display: inline-block;
      border: 1px solid #4a6070;
      border-radius: 3px;
      padding: 1px 6px;
      margin: 0 3px;
      color: #d0e4f0;
    }

    footer {
      position: fixed;
      bottom: 12px;
      font-size: 0.65rem;
      color: #1e2d3d;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

<!--
  IP OF JORDAN MODDES — jordanmoddes.com
  DocTrack Terminal — test build with quick-fire buttons
-->

<!-- Hidden input captures real scanner input -->
<input id="scanner-input" type="text" autocomplete="off" autofocus />

<div id="step-label">Step 1 of 4</div>
<div id="prompt">SCAN BADGE</div>
<div id="scanned-value">&nbsp;</div>

<div id="progress">
  <div class="dot active" id="dot-1"></div>
  <div class="dot"        id="dot-2"></div>
  <div class="dot"        id="dot-3"></div>
  <div class="dot"        id="dot-4"></div>
</div>

<div id="status">&nbsp;</div>

<div id="timeout-bar-wrap" style="visibility:hidden;">
  <div id="timeout-bar"></div>
</div>

<!-- Test buttons — visible per step -->
<div id="test-buttons"></div>

<div id="hint">SCANNER NOT WORKING? PRESS <span class="key">B</span> FOR MANUAL ENTRY</div>

<!-- Manual entry overlay -->
<div id="manual-overlay">
  <div id="manual-title">⚠ Manual Entry Mode</div>
  <div id="manual-prompt">Type value for current step</div>
  <input id="manual-field" type="text" autocomplete="off" />
  <div id="manual-instructions">
    <span class="key">ENTER</span> SUBMIT &nbsp;&nbsp; <span class="key">ESC</span> CANCEL
  </div>
</div>

<footer>IP OF JORDAN MODDES &nbsp;|&nbsp; jordanmoddes.com &nbsp;|&nbsp; INTERNAL USE ONLY</footer>


<script>
  // ============================================================
  //  CONFIG
  // ============================================================
  const DEMO_MODE     = false;                                      // false = real backend
  const API_BASE_URL  = 'https://doctrack-backend-qga8.onrender.com';
  const TIMEOUT_SECS  = 15;


  // ============================================================
  //  STEPS
  // ============================================================
  const STEPS = [
    { label: 'Step 1 of 4', prompt: 'SCAN BADGE',      field: 'badge'      },
    { label: 'Step 2 of 4', prompt: 'SCAN FOLDER ID',  field: 'docID'      },
    { label: 'Step 3 of 4', prompt: 'SCAN WIP / DROP', field: 'eventType'  },
    { label: 'Step 4 of 4', prompt: 'SCAN DEPARTMENT', field: 'department' },
  ];


  // ============================================================
  //  BARCODE MAPS
  // ============================================================
  const EVENT_BARCODES = {
    'EVT-WIP':  'WIP',
    'EVT-DROP': 'DROP-OFF',
  };

  // NOTE: 'Test Department' is added here so test button works
  const DEPT_BARCODES = {
    'DEPT-PLAN': 'Planning',
    'DEPT-QC':   'QC Review',
    'DEPT-LAB':  'Lab',
    'DEPT-WH':   'Warehouse',
    'DEPT-STOR': 'Storage',
    'DEPT-SHIP': 'Shipping / Receiving',
    'DEPT-TEST': 'Test Department',
  };


  // ============================================================
  //  STATE
  // ============================================================
  let currentStep   = 0;
  let scan          = {};
  let entryMethod   = 'SCAN';
  let manualMode    = false;
  let timeoutHandle = null;


  // ============================================================
  //  UI HELPERS
  // ============================================================
  function setPrompt(stepIndex) {
    document.getElementById('step-label').textContent  = STEPS[stepIndex].label;
    document.getElementById('prompt').textContent      = STEPS[stepIndex].prompt;
    document.getElementById('scanned-value').innerHTML = '&nbsp;';
    document.getElementById('status').innerHTML        = '&nbsp;';
    document.getElementById('status').className        = '';

    for (let i = 0; i < 4; i++) {
      const dot = document.getElementById(`dot-${i + 1}`);
      if (i < stepIndex)        dot.className = 'dot done';
      else if (i === stepIndex) dot.className = 'dot active';
      else                      dot.className = 'dot';
    }

    renderTestButtons(stepIndex);
  }

  function showStatus(msg, type) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = type || '';
  }

  function flashValue(val) {
    document.getElementById('scanned-value').textContent = val;
  }


  // ============================================================
  //  TEST BUTTONS — render different buttons per step
  // ============================================================
  function renderTestButtons(stepIndex) {
    const wrap = document.getElementById('test-buttons');
    wrap.innerHTML = '';

    if (stepIndex === 0) {
      // Step 1: badge 257001
      const btn = document.createElement('button');
      btn.className = 'test-btn';
      btn.textContent = 'PREFILL BADGE 257001';
      btn.onclick = () => processValue('257001', false);
      wrap.appendChild(btn);
    }
    else if (stepIndex === 1) {
      // Step 2: test folder
      const btn = document.createElement('button');
      btn.className = 'test-btn';
      btn.textContent = 'TEST';
      btn.onclick = () => processValue('test folder', false);
      wrap.appendChild(btn);
    }
    else if (stepIndex === 2) {
      // Step 3: WIP or DROP buttons
      const wipBtn = document.createElement('button');
      wipBtn.className = 'test-btn';
      wipBtn.textContent = 'WIP';
      wipBtn.onclick = () => processValue('EVT-WIP', false);
      wrap.appendChild(wipBtn);

      const dropBtn = document.createElement('button');
      dropBtn.className = 'test-btn';
      dropBtn.textContent = 'DROP';
      dropBtn.onclick = () => processValue('EVT-DROP', false);
      wrap.appendChild(dropBtn);
    }
    else if (stepIndex === 3) {
      // Step 4: test department
      const btn = document.createElement('button');
      btn.className = 'test-btn';
      btn.textContent = 'TEST';
      btn.onclick = () => processValue('DEPT-TEST', false);
      wrap.appendChild(btn);
    }
  }


  // ============================================================
  //  TIMEOUT
  // ============================================================
  function startTimeout() {
    clearTimeout(timeoutHandle);

    if (currentStep === 0) {
      document.getElementById('timeout-bar-wrap').style.visibility = 'hidden';
      return;
    }

    const bar = document.getElementById('timeout-bar');
    const wrap = document.getElementById('timeout-bar-wrap');
    wrap.style.visibility = 'visible';
    bar.style.transition = 'none';
    bar.style.width = '100%';

    setTimeout(() => {
      bar.style.transition = `width ${TIMEOUT_SECS}s linear`;
      bar.style.width = '0%';
    }, 10);

    timeoutHandle = setTimeout(() => {
      showStatus('⏱ TIMED OUT — ENTRY DISCARDED', 'warn');
      hardReset();
      setTimeout(() => setPrompt(0), 100);
    }, TIMEOUT_SECS * 1000);
  }

  function stopTimeout() {
    clearTimeout(timeoutHandle);
    document.getElementById('timeout-bar-wrap').style.visibility = 'hidden';
  }


  // ============================================================
  //  RESET
  // ============================================================
  function softReset() {
    setTimeout(() => {
      hardReset();
      setPrompt(0);
    }, 2000);
  }

  function hardReset() {
    scan = {};
    currentStep = 0;
    entryMethod = 'SCAN';
    stopTimeout();
  }


  // ============================================================
  //  SUBMIT — sends event to backend
  // ============================================================
  async function submitEvent() {
    stopTimeout();

    const payload = {
      timestamp:     new Date().toISOString(),
      badge:         scan.badge,
      docID:         scan.docID,
      eventType:     scan.eventType,
      department:    scan.department,
      entry_method:  entryMethod,
    };

    if (DEMO_MODE) {
      console.log('SCAN EVENT LOGGED (demo):', payload);
      const methodTag = entryMethod === 'MANUAL' ? ' [MANUAL]' : '';
      showStatus(`✓ LOGGED${methodTag} — ${scan.eventType} | ${scan.docID} | ${scan.department}`, 'success');
      softReset();
      return;
    }

    // Live backend call
    try {
      const response = await fetch(`${API_BASE_URL}/scan-log`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(payload),
      });

      const result = await response.json();
      console.log('Backend response:', result);

      if (result.ok) {
        const methodTag = entryMethod === 'MANUAL' ? ' [MANUAL]' : '';
        const ssOk = result.smartsheet && result.smartsheet.ok;
        const ssStatus = ssOk ? ' ✓ SMARTSHEET' : ' ⚠ BACKUP ONLY';
        showStatus(`✓ LOGGED${methodTag}${ssStatus}`, ssOk ? 'success' : 'warn');

        if (!ssOk && result.smartsheet) {
          console.error('Smartsheet error:', result.smartsheet.error);
        }
      } else {
        showStatus(`⚠ ERROR: ${result.error || 'Unknown'}`, 'error');
      }
    } catch (err) {
      console.error('Network error:', err);
      showStatus('⚠ NETWORK ERROR — TRY AGAIN', 'error');
    }

    softReset();
  }


  // ============================================================
  //  PROCESS VALUE — advances through the 4 steps
  // ============================================================
  function processValue(value, isManual) {
    value = (value || '').trim();
    if (!value) return;

    if (isManual) entryMethod = 'MANUAL';

    const field = STEPS[currentStep].field;

    // STEP 1: Badge
    if (field === 'badge') {
      scan.badge = value;
      flashValue(value + (isManual ? ' (manual)' : ''));
      currentStep++;
      setPrompt(currentStep);
      startTimeout();
      return;
    }

    // STEP 2: Folder ID
    if (field === 'docID') {
      scan.docID = value;
      flashValue(value + (isManual ? ' (manual)' : ''));
      currentStep++;
      setPrompt(currentStep);
      startTimeout();
      return;
    }

    // STEP 3: WIP or DROP
    if (field === 'eventType') {
      let mapped = EVENT_BARCODES[value.toUpperCase()];
      if (!mapped) {
        const upper = value.toUpperCase();
        if (upper === 'WIP')                              mapped = 'WIP';
        else if (upper === 'DROP' || upper === 'DROP-OFF') mapped = 'DROP-OFF';
      }
      if (!mapped) {
        showStatus('⚠ UNKNOWN — SCAN WIP OR DROP LABEL', 'error');
        return;
      }

      scan.eventType = mapped;
      flashValue(mapped + (isManual ? ' (manual)' : ''));

      // WIP = auto-submit without department (per your spec)
      if (mapped === 'WIP') {
        scan.department = 'N/A (WIP)';

        // mark all dots done
        for (let i = 0; i < 4; i++) {
          document.getElementById(`dot-${i + 1}`).className = 'dot done';
        }
        document.getElementById('prompt').textContent = 'SUBMITTING...';
        document.getElementById('test-buttons').innerHTML = '';

        submitEvent();
        return;
      }

      // DROP = advance to department step
      currentStep++;
      setPrompt(currentStep);
      startTimeout();
      return;
    }

    // STEP 4: Department
    if (field === 'department') {
      let mapped = DEPT_BARCODES[value.toUpperCase()];
      if (!mapped) {
        for (const [code, name] of Object.entries(DEPT_BARCODES)) {
          if (name.toUpperCase() === value.toUpperCase()) {
            mapped = name;
            break;
          }
        }
      }
      if (!mapped) {
        showStatus('⚠ UNKNOWN — SCAN DEPARTMENT LABEL', 'error');
        return;
      }

      scan.department = mapped;
      flashValue(mapped + (isManual ? ' (manual)' : ''));

      for (let i = 0; i < 4; i++) {
        document.getElementById(`dot-${i + 1}`).className = 'dot done';
      }
      document.getElementById('prompt').textContent = 'SUBMITTING...';
      document.getElementById('test-buttons').innerHTML = '';

      submitEvent();
      return;
    }
  }


  // ============================================================
  //  MANUAL ENTRY
  // ============================================================
  function openManualEntry() {
    manualMode = true;
    const overlay = document.getElementById('manual-overlay');
    const field   = document.getElementById('manual-field');
    const prompt  = document.getElementById('manual-prompt');

    const stepPrompts = {
      0: 'Enter badge number',
      1: 'Enter folder ID',
      2: 'Enter WIP or DROP',
      3: 'Enter department (e.g. Lab, QC Review)',
    };
    prompt.textContent = stepPrompts[currentStep];

    overlay.classList.add('active');
    field.value = '';
    field.focus();

    startTimeout();
  }

  function closeManualEntry() {
    manualMode = false;
    document.getElementById('manual-overlay').classList.remove('active');
    document.getElementById('scanner-input').focus();
  }

  const manualField = document.getElementById('manual-field');
  manualField.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      const val = manualField.value;
      closeManualEntry();
      processValue(val, true);
    } else if (e.key === 'Escape') {
      e.preventDefault();
      closeManualEntry();
      startTimeout();
    }
    startTimeout();
  });


  // ============================================================
  //  SCANNER INPUT HANDLER
  // ============================================================
  const input = document.getElementById('scanner-input');
  let buffer = '';

  input.addEventListener('keydown', (e) => {
    if (manualMode) return;
    startTimeout();

    if (e.key === 'Enter') {
      processValue(buffer, false);
      buffer = '';
      input.value = '';
      return;
    }

    if ((e.key === 'b' || e.key === 'B') && buffer === '') {
      e.preventDefault();
      openManualEntry();
      return;
    }

    if (e.key.length === 1) {
      buffer += e.key;
    }
  });


  // ============================================================
  //  FOCUS MANAGEMENT
  // ============================================================
  function refocus() {
    if (manualMode) {
      document.getElementById('manual-field').focus();
    } else {
      input.focus();
    }
  }

  // Don't refocus when clicking test buttons — let them work
  document.addEventListener('click', (e) => {
    if (!e.target.classList.contains('test-btn')) {
      refocus();
    }
  });
  document.addEventListener('focusout', () => setTimeout(refocus, 50));
  window.addEventListener('load',       refocus);


  // ============================================================
  //  INIT
  // ============================================================
  setPrompt(0);
</script>

</body>
</html>
