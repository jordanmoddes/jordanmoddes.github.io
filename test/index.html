<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DocTrack Terminal</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet"/>

  <!--
  ============================================================
    IP OF JORDAN MODDES
    DocTrack Terminal v2.0
    Designed & Built by Jordan Moddes | jordanmoddes.com
    For: Cerilliant / MilliporeSigma — Internal Use Only

    SCANNER-ONLY INTERFACE — no mouse required
    Scan flow: Badge → Folder ID → WIP/DROP → Department

    TO SWITCH TO LIVE BACKEND:
    1. Set DEMO_MODE = false
    2. Set API_BASE_URL to your internal server IP
    That's it.
  ============================================================
  -->

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0e13;
      color: #d0e4f0;
      font-family: 'Share Tech Mono', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* Step counter — small text above prompt */
    #step-label {
      font-size: 1rem;
      color: #4a6070;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    /* Big instruction text — tells operator what to scan */
    #prompt {
      font-size: 2.8rem;
      font-weight: bold;
      color: #00c8ff;
      text-align: center;
      margin-bottom: 32px;
      line-height: 1.2;
    }

    /* Shows what was just scanned */
    #scanned-value {
      font-size: 1.5rem;
      color: #00ff9d;
      min-height: 2rem;
      text-align: center;
      margin-bottom: 48px;
      letter-spacing: 2px;
    }

    /* Four progress dots — one per step */
    #progress {
      display: flex;
      gap: 16px;
      margin-bottom: 48px;
    }
    .dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #1e2d3d;
      border: 2px solid #1e2d3d;
      transition: all 0.2s;
    }
    .dot.done   { background: #00ff9d; border-color: #00ff9d; }
    .dot.active { background: #00c8ff; border-color: #00c8ff; }

    /* Result message after submit */
    #status {
      font-size: 1.1rem;
      text-align: center;
      min-height: 2rem;
      letter-spacing: 1px;
    }
    #status.success { color: #00ff9d; }
    #status.error   { color: #ff6b35; }

    /* Hidden input — always focused, receives scanner input */
    #scanner-input {
      position: fixed;
      top: -999px;
      left: -999px;
      opacity: 0;
      width: 1px;
      height: 1px;
    }

    footer {
      position: fixed;
      bottom: 12px;
      font-size: 0.65rem;
      color: #1e2d3d;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

<!--
  IP OF JORDAN MODDES — jordanmoddes.com
  DocTrack Terminal — scanner-only, no mouse required
-->

<!-- This invisible input captures every barcode scan -->
<input id="scanner-input" type="text" autocomplete="off" autofocus />

<div id="step-label">Step 1 of 4</div>
<div id="prompt">SCAN BADGE</div>
<div id="scanned-value">&nbsp;</div>

<div id="progress">
  <div class="dot active" id="dot-1"></div>
  <div class="dot"        id="dot-2"></div>
  <div class="dot"        id="dot-3"></div>
  <div class="dot"        id="dot-4"></div>
</div>

<div id="status">&nbsp;</div>

<footer>IP OF JORDAN MODDES &nbsp;|&nbsp; jordanmoddes.com &nbsp;|&nbsp; INTERNAL USE ONLY</footer>


<script>
  // ============================================================
  //  CONFIG
  //  DEMO_MODE = true  → logs to console only, no network calls
  //  DEMO_MODE = false → calls real backend at API_BASE_URL
  // ============================================================
  const DEMO_MODE    = true;
  const API_BASE_URL = 'https://moddes-backend.onrender.com';
  //  ↑ Change this to internal server IP when IT is ready ↑


  // ============================================================
  //  SCAN STEPS
  //  Order: badge → docID → eventType → department
  // ============================================================
  const STEPS = [
    { label: 'Step 1 of 4', prompt: 'SCAN BADGE',      field: 'badge'      },
    { label: 'Step 2 of 4', prompt: 'SCAN FOLDER ID',  field: 'docID'      },
    { label: 'Step 3 of 4', prompt: 'SCAN WIP / DROP', field: 'eventType'  },
    { label: 'Step 4 of 4', prompt: 'SCAN DEPARTMENT', field: 'department' },
  ];


  // ============================================================
  //  BARCODE MAPS
  //  These are the barcodes printed on the physical WIP/DROP
  //  labels and department terminal labels.
  //  Add or change values here when real barcodes are assigned.
  // ============================================================

  // WIP and DROP-OFF labels — two barcodes printed, one posted at each terminal
  const EVENT_BARCODES = {
    'EVT-WIP':  'WIP',
    'EVT-DROP': 'DROP-OFF',
  };

  // Department terminal barcodes — one per physical location
  const DEPT_BARCODES = {
    'DEPT-PLAN': 'Planning',
    'DEPT-QC':   'QC Review',
    'DEPT-LAB':  'Lab',
    'DEPT-WH':   'Warehouse',
    'DEPT-STOR': 'Storage',
    'DEPT-SHIP': 'Shipping / Receiving',
  };


  // ============================================================
  //  STATE — tracks current step and collected scan values
  // ============================================================
  let currentStep = 0;
  let scan = {};   // { badge, docID, eventType, department }


  // ============================================================
  //  UI — update screen for given step index
  // ============================================================
  function setPrompt(stepIndex) {
    document.getElementById('step-label').textContent  = STEPS[stepIndex].label;
    document.getElementById('prompt').textContent      = STEPS[stepIndex].prompt;
    document.getElementById('scanned-value').innerHTML = '&nbsp;';
    document.getElementById('status').innerHTML        = '&nbsp;';
    document.getElementById('status').className        = '';

    for (let i = 0; i < 4; i++) {
      const dot = document.getElementById(`dot-${i + 1}`);
      if (i < stepIndex)      dot.className = 'dot done';
      else if (i === stepIndex) dot.className = 'dot active';
      else                    dot.className = 'dot';
    }
  }

  function showStatus(msg, type) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = type;
  }

  function flashValue(val) {
    document.getElementById('scanned-value').textContent = val;
  }


  // ============================================================
  //  RESET — clears state and returns to step 1
  //  Waits 2 seconds so operator can read the result first
  // ============================================================
  function reset() {
    setTimeout(() => {
      scan = {};
      currentStep = 0;
      setPrompt(0);
    }, 2000);
  }


  // ============================================================
  //  SUBMIT — sends completed scan event to backend
  // ============================================================
  async function submitEvent() {
    const payload = {
      timestamp:  new Date().toISOString(),
      badge:      scan.badge,
      docID:      scan.docID,
      eventType:  scan.eventType,
      department: scan.department,
    };

    if (DEMO_MODE) {
      // Demo mode — print to console, show success, reset
      console.log('SCAN EVENT LOGGED:', payload);
      showStatus(`✓ LOGGED — ${scan.eventType} | ${scan.docID} | ${scan.department}`, 'success');
      reset();
      return;
    }

    /*
    ============================================================
      LIVE BACKEND — uncomment when IT server is ready
      Change API_BASE_URL at the top of this file to point
      to the internal server IP address.
    ============================================================
    try {
      await fetch(`${API_BASE_URL}/scan-log`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(payload),
      });
      showStatus(`✓ LOGGED — ${scan.eventType} | ${scan.docID} | ${scan.department}`, 'success');
    } catch (err) {
      showStatus('⚠ NETWORK ERROR — TRY AGAIN', 'error');
    }
    reset();
    */
  }


  // ============================================================
  //  PROCESS SCAN — called each time scanner fires
  // ============================================================
  function processScan(raw) {
    const value = raw.trim();
    if (!value) return;

    const field = STEPS[currentStep].field;

    // STEP 1: Badge — accept any value, no validation needed
    if (field === 'badge') {
      scan.badge = value;
      flashValue(value);
      currentStep++;
      setPrompt(currentStep);
      return;
    }

    // STEP 2: Folder ID — accept any value
    if (field === 'docID') {
      scan.docID = value;
      flashValue(value);
      currentStep++;
      setPrompt(currentStep);
      return;
    }

    // STEP 3: WIP or DROP — must match a known event barcode
    if (field === 'eventType') {
      const mapped = EVENT_BARCODES[value];
      if (!mapped) {
        showStatus('⚠ UNKNOWN — SCAN WIP OR DROP LABEL', 'error');
        return;
      }
      scan.eventType = mapped;
      flashValue(mapped);
      currentStep++;
      setPrompt(currentStep);
      return;
    }

    // STEP 4: Department — must match a known department barcode, then auto-submit
    if (field === 'department') {
      const mapped = DEPT_BARCODES[value];
      if (!mapped) {
        showStatus('⚠ UNKNOWN — SCAN DEPARTMENT LABEL', 'error');
        return;
      }
      scan.department = mapped;
      flashValue(mapped);

      // Mark all dots complete
      for (let i = 0; i < 4; i++) {
        document.getElementById(`dot-${i + 1}`).className = 'dot done';
      }
      document.getElementById('prompt').textContent = 'SUBMITTING...';

      submitEvent();
      return;
    }
  }


  // ============================================================
  //  SCANNER INPUT HANDLER
  //  USB scanners act like keyboards — they type characters
  //  then send an Enter keystroke when the scan is complete.
  //  We buffer the characters and fire processScan on Enter.
  // ============================================================
  const input = document.getElementById('scanner-input');
  let buffer = '';

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      processScan(buffer);
      buffer = '';
      input.value = '';
    } else if (e.key.length === 1) {
      // Only add printable characters to buffer
      buffer += e.key;
    }
  });

  // Keep the hidden input focused at all times
  // Scanner won't work if focus drifts away
  document.addEventListener('click',    () => input.focus());
  document.addEventListener('focusout', () => setTimeout(() => input.focus(), 50));
  window.addEventListener('load',       () => input.focus());


  // ============================================================
  //  INIT
  // ============================================================
  setPrompt(0);
</script>

</body>
</html>
